  {th:"disruption", s:"@OReilly", t:"Microsoft эпохи stack ranking: «мы хотели раздавить всех конкурентов — а раздавив, начали давить друг друга». 90% сотрудников хранили верность Windows, когда рынок ушёл 10:1.", d:"Stack ranking заставлял каждую команду ежегодно объявлять часть своих людей худшими — и сотрудники начали конкурировать друг с другом, а не с рынком. Когда внешние враги были раздавлены, культура агрессии повернулась внутрь: подразделения прятали информацию и топили чужие продукты. Пока внутри шла война за рейтинг и лояльность Windows, рынок ушёл в мобильные устройства с перевесом 10:1 — Microsoft пропустил смартфоны и получил «потерянное десятилетие», которое закончилось лишь когда Наделла отменил stack ranking и сменил врага с коллеги на конкурента."},
  {th:"disruption", s:"@OReilly", t:"Швейцарцы сами изобрели кварцевые часы — и сами их отвергли: каждый функционал сказал локально рациональное «нет». Компанию убивает сумма рациональных «нет»; итог — минус 60 000 рабочих мест.", d:"К концу 1960-х швейцарцы доминировали на мировом рынке часов и сами же, в исследовательском центре в Невшателе, создали кварцевый механизм. Но маркетинг сказал «клиент любит механику», производство — «наши активы заточены под шестерёнки», дистрибуция — «ювелиры не станут продавать электронику»: каждое «нет» было локально рациональным. Кварц подхватили Seiko и Casio, и за десятилетие отрасль потеряла порядка 60 000 рабочих мест из 90 000. Дизрапция редко приходит незамеченной — компанию убивает не слепота, а сумма разумных возражений."},
  {th:"disruption", s:"@OReilly", t:"Компании банкротятся не из-за технологий, а из-за лидеров, не умеющих играть в две игры одновременно — эксплуатировать сегодняшний бизнес и исследовать завтрашний.", d:"Технология почти никогда не застаёт врасплох: Kodak сам изобрёл цифровую камеру, Blockbuster мог купить Netflix за $50 млн — и оба всё видели. Гибнут не от незнания, а от неспособности лидеров играть в две игры сразу: exploit требует дисциплины, маржи и предсказуемости, explore — экспериментов, провалов и других метрик, и эти режимы враждуют под одной крышей. Ambidextrous-организация по О'Райли и Ташману держит оба режима одновременно, и разруливать их конфликт обязана лично топ-команда — больше некому."},
  {th:"disruption", s:"@OReilly", t:"«Мне два года до пенсии, и бонус привязан к акциям — я не буду этого делать»: трансформацию блокирует структура вознаграждения, а не слепота.", d:"О'Райли пересказывает признание топ-менеджера: угрозу он видел прекрасно, но до пенсии два года, бонус привязан к курсу акций, а трансформация просадит их раньше, чем даст плоды. Это не когнитивная слепота, а трезвый расчёт внутри неверно настроенной системы. Пока вознаграждение топов привязано к краткосрочным результатам ядра, любой explore будет рационально отвергнут — поэтому менять надо не людей на «более смелых», а структуру стимулов и горизонт, за который платят."},
  {th:"disruption", s:"@OReilly", t:"<q>If you know it's going to work in advance, it is not an experiment</q> (Безос): нужны провалы в новом и непроверенном, а не брак в отлаженном.", d:"Безос разделяет два типа провалов: операционный брак в отлаженном бизнесе непростителен, а провал эксперимента — это купленная информация. Fire Phone стал громким фиаско, но та же готовность ошибаться дала AWS, Kindle и Prime — портфель окупает всё. Лакмус простой: если среди ваших «экспериментов» нет провалов, вы ставите только на заведомо работающее, то есть не экспериментируете вовсе."},
  {th:"disruption", s:"@OReilly", t:"Инновациям нужно «много путей к да»: в корпорации пять уровней могут сказать «нет», стартапу хватает одного «да» из двадцати фондов. Эксперименты дёшевы — дорого становится, когда они срабатывают.", d:"В корпорации идея должна пройти цепочку согласований, где каждый из пяти уровней может её убить, — а стартапу достаточно одного «да» от одного из двадцати фондов. Поэтому экосистема стабильно обыгрывает отдельную фирму: у неё много дверей к «да». Отсюда дизайн IBM Emerging Business Opportunities и амазоновских механизмов — создать внутри компании несколько независимых путей для идеи в обход вертикали. И вторая половина мысли: сами эксперименты дёшевы, настоящие деньги и конфликт с ядром начинаются тогда, когда эксперимент сработал."},
  {th:"disruption", s:"@OReilly", t:"400 идей — 1 в рынке: компании умирают не на генерации, а на масштабировании, потому что оно отнимает ресурсы у действующего бизнеса.", d:"Воронка инноваций беспощадна — из сотен идей рынка достигают единицы, но узкое место не там, где кажется. Генерировать компании умеют: хакатоны и лаборатории есть у всех. Умирают на фазе scaling, когда новый бизнес начинает требовать людей, капитал и внимание у прибыльного ядра — и ядро в этой борьбе всегда сильнее. IBM ответила программой Emerging Business Opportunities: защищённое финансирование, отдельные метрики и кураторство топов, чтобы росток не задушили в момент пересадки."},
  {th:"disruption", s:"@OReilly", t:"Задача лидера — не предсказать будущее, а построить организацию, которая его обнаружит: Amazon не предсказал AWS — открыл его.", d:"AWS не значился ни в одном стратегическом плане: Amazon строил инфраструктуру для себя, заметил чужой спрос на неё — и имел механизмы, чтобы превратить наблюдение в бизнес: PR/FAQ, two-pizza команды, культуру дешёвых экспериментов. О'Райли переворачивает роль лидера: прогнозы всё равно врут, поэтому задача — не угадать будущее, а построить организацию с сенсорами и свободой действовать, которая обнаружит будущее раньше конкурентов и успеет на него поставить."},
  {impl:true, th:"creativity", s:"@Wheeler", t:"Пространство решений задаётся формулировкой проблемы: «ручка для космоса» — одно решение, «записывать информацию в космосе» — целый веер. Абстрагируй проблему через «5 почему».", d:"Классическая иллюстрация — космическая ручка: если задача звучит как <q>сделать ручку, пишущую в невесомости</q>, ответ один — дорогая ручка с картриджем под давлением; если как <q>записывать информацию в космосе</q> — открывается веер от карандаша до диктофона. Формулировка проблемы незаметно отсекает большую часть пространства решений ещё до начала поиска. Практика: прежде чем генерировать идеи, поднимись по лестнице абстракции через <b>5 почему</b> — спрашивай, зачем на самом деле нужно то, что просят, пока не дойдёшь до настоящей потребности, и генерируй решения уже на этом уровне."},
  {th:"creativity", s:"@Wheeler", t:"«Идеи кончились» — ложный сигнал: лучшие идеи приходят после того, как стало трудно. Качество лучшей идеи коррелирует с общим количеством.", d:"Ощущение <q>всё, идеи кончились</q> — не сигнал остановиться, а отметка, где заканчиваются очевидные варианты и начинаются интересные: первые идеи у всех примерно одинаковы, оригинальное появляется после того, как исчерпан стандартный слой. Исследования генерации идей показывают: люди систематически недооценивают, сколько ещё придумают, если продолжат после точки дискомфорта, а качество лучшей идеи растёт вместе с общим числом попыток. Поэтому количество — не враг качества, а его условие: хочешь одну великую идею — заставь себя выдать много посредственных."},
  {th:"creativity", s:"@Wheeler", t:"Правило Клиза: если решение можно принять в понедельник — не принимай его сегодня. Дискомфорт незакрытого вопроса — это инкубация, а не нерешительность.", d:"Джон Клиз сформулировал контринтуитивное правило творческой работы: если решение можно отложить до понедельника — не принимай его сегодня. Пока вопрос открыт, подсознание продолжает над ним работать, и в понедельник решение оказывается лучше пятничного; закрыв вопрос раньше срока, ты покупаешь комфорт ценой качества. Неприятное зудящее чувство незакрытой задачи — это не нерешительность, а идущая инкубация; умение его выдерживать отличает креативных людей от тех, кто хватается за первый приемлемый вариант."},
  {impl:true, th:"creativity", s:"@Wheeler", t:"Генератор и судья в голове не работают одновременно: включил оценку — генерация встала. Разноси во времени: половина встречи — только идеи, вторая — только отбор.", d:"Генерация и оценка — два разных когнитивных режима, и включённый внутренний судья мгновенно останавливает поток идей: люди начинают цензурировать варианты до того, как те успели прозвучать. Именно поэтому классический брейншторм так часто вырождается в осторожный обмен банальностями — критика и придумывание идут вперемешку. Практика: жёстко разноси режимы во времени — первая половина встречи только генерация, любые идеи без единого <q>но</q>, вторая — только отбор; то же правило работает и в одиночку: пиши черновик не редактируя, редактируй не дописывая."},
  {th:"creativity", s:"@Wheeler", t:"Инструкция «придумайте креативные варианты» даёт меньше креативных идей, чем простое «придумайте варианты»: требование оригинальности ломает процесс.", d:"Парадоксальный экспериментальный результат: группа с инструкцией <q>придумайте креативные варианты</q> выдаёт менее оригинальные идеи, чем группа с простым <q>придумайте варианты</q>. Требование оригинальности включает самоконтроль — человек начинает оценивать каждую идею на достаточную креативность ещё до её появления, и генератор глохнет; это тот же механизм, из-за которого команда <q>расслабься</q> заставляет напрячься. Вывод для руководителя: не требуй от команды гениальности — снимай давление, проси просто варианты, и оригинальность придёт сама как побочный продукт объёма."},
  {th:"creativity", s:"@Wheeler", t:"Мы тестируем гипотезы подтверждающе (задача «2-4-6»): предлагаем только примеры под свою теорию. Специально проверяй то, что должно сломать твою версию.", d:"В задаче Уэйсона <q>2-4-6</q> людям называют тройку чисел и просят угадать правило, предлагая свои тройки: почти все, решив, что правило — чётные с шагом два, проверяют только подтверждающие примеры вроде 8-10-12 и уверенно называют неверный ответ, хотя настоящее правило — просто возрастающие числа. Ошибка не в гипотезе, а в стратегии проверки: мы инстинктивно ищем подтверждения и не предлагаем примеры, способные нас опровергнуть. В бизнесе то же самое: пилот, спроектированный чтобы доказать идею, всегда её докажет — специально конструируй тест, который должен сломать твою версию, и только выживание после него чего-то стоит."},
  {th:"creativity", s:"@Wheeler", t:"Прорывы — продукт неэффективного процесса: Флеминг посмотрел на испорченную чашку и сказал «хм?», а не «не получилось». Готовность отвлечься — навык, а не потеря фокуса.", d:"Флеминг увидел плесень, убившую бактерии в испорченной чашке Петри, и вместо <q>эксперимент не удался, выбросить</q> сказал <q>хм, любопытно</q> — так появился пенициллин. Прорывы почти всегда рождаются на обочине основного процесса: у идеально эффективной работы, где каждая минута расписана под план, нет слотов для аномалий и случайных находок. Готовность отвлечься на странное — не потеря фокуса, а отдельный навык: аномалия несёт больше информации, чем подтверждение, но замечает её только тот, кто оставил себе слабину в расписании."},
  {th:"creativity", s:"@Wheeler", t:"Креативность — охота за грибами, а не бухгалтерия: нет операций, гарантирующих результат, есть условия, повышающие вероятность. «Научившись видеть грибы — видишь их везде».", d:"Метафора Уилера: бухгалтерия — это операции с гарантированным результатом, правильно сложил — получил баланс; за грибами так не сходишь. Нельзя выполнить последовательность шагов, гарантирующую великую идею, — можно лишь пойти в правильный лес в правильный сезон, то есть создать условия, повышающие вероятность находки: насмотренность, инкубацию, объём попыток, разведение генерации и оценки. И как грибник, однажды научившийся видеть грибы, начинает видеть их везде, так и натренированный на поиск возможностей взгляд находит их там, где остальные проходят мимо. Ошибка менеджеров — требовать от творчества бухгалтерской предсказуемости: управлять можно условиями, а не результатом."},
  {th:"culture", s:"@OReilly", t:"«Замёрзшая глина»: в слияниях топы выравниваются первыми, а средний менеджмент застывает. Убирать тех, кто не принимает новое поведение, надо быстрее, чем комфортно.", d:"Метафора трансформаций и слияний: организация — глина, схватывающаяся слоями. Топ-команда выравнивается первой — она сама писала новые правила; рядовые сотрудники следуют за средой; а средний менеджмент «замерзает» — у него больше всех вложено в старый порядок и меньше всех выгод от нового. О'Райли жёсток: тех, кто демонстративно не принимает новое поведение, нужно убирать быстрее, чем комфортно, — каждый месяц их присутствия сигналит остальным, что изменение опционально."},
  {impl:true, th:"culture", s:"@OReilly", t:"Тактики Наделлы пакетом: раздал топам «Ненасильственное общение», 9 месяцев слушал сотрудников (что сохранить / что менять / что мешает), нашёл внутренних инфлюенсеров по метаданным email независимо от ранга, убил stack ranking и ввёл «культурное интервью» для повышения в VP.", d:"Разбор трансформации Microsoft показывает: сработал пакет, а не жест. Наделла раздал топ-команде «Ненасильственное общение» как общий язык, девять месяцев слушал сотрудников по трём вопросам — что сохранить, что менять, что мешает, — нашёл настоящих инфлюенсеров по метаданным переписки независимо от ранга, демонтировал stack ranking, стравливавший людей, и сделал культурное интервью фильтром на повышение в VP. <b>Практика:</b> проектируй изменение как систему ходов, закрывающую все рычаги LEASH, — одиночная инициатива, даже яркая, культуру не сдвинет."},
  {th:"culture", s:"@OReilly", t:"Бетьюн перекрасил самолёты и сжёг регламент на парковке: «если рабочее место выглядит как у лузера — сотрудники чувствуют себя лузерами», а сожжённая книга правил — сигнал «используйте собственное суждение».", d:"Первые ходы Бетьюна в Continental были символическими: срочно перекрасить облезлый разномастный флот — потому что <q>если рабочее место выглядит как у лузера, люди чувствуют себя лузерами</q> — и публично сжечь на парковке толстый корпоративный регламент. Сожжённая книга правил сказала громче любого меморандума: мы доверяем вашему суждению в интересах клиента. Символы — самый быстрый канал культурной коммуникации: их считывают мгновенно и пересказывают годами."},
  {impl:true, th:"culture", s:"@OReilly", t:"«Круг благодарности»: даже в жёсткий кризис ритуал «за что мы благодарны» сдвигает культуру команды из пессимизма в оптимизм (кейс ливанского финансового кризиса).", d:"Пример из курса: команда в Ливане в разгар финансового кризиса — банки заморожены, горизонт планирования нулевой — ввела ритуал начинать каждую встречу кругом «за что мы благодарны». Простая практика систематически смещала фокус группы с потерь на ресурсы и удерживала людей в действии, когда контекст толкал в паралич. <b>Практика:</b> в кризис не жди подходящего настроения — встрой благодарность как обязательный ритуал открытия встреч; культура команды складывается из повторяемых микроритуалов, а не из обстоятельств."},
  {impl:true, th:"disruption", s:"@OReilly", t:"Amazon работает задом наперёд — PR/FAQ: прежде чем строить, напиши пресс-релиз и FAQ будущего продукта. Это форсирует ясность о проблеме клиента, а не о технологии.", d:"Механика working backwards: до единой строчки кода команда пишет пресс-релиз будущего продукта на языке клиента и FAQ с самыми неудобными вопросами. Если пресс-релиз скучен, а проблема клиента не формулируется в одном абзаце — продукт не строят; через это сито прошли Kindle и AWS. Фокус смещается с «какая у нас классная технология» на «чью боль мы снимаем». <b>Практика:</b> перед следующей инициативой напиши одну страницу пресс-релиза и честный FAQ — половина идей умрёт на бумаге, и это самая дешёвая из возможных смертей."},
  {impl:true, th:"disruption", s:"@OReilly", t:"Три фазы инноваций — три разные дисциплины: Ideation (PR/FAQ) → Incubation (изолированные «2-pizza» команды, защищённые от ядра) → Scaling (перенос в ядро). Компании путают их — и умирают на стыках.", d:"Ideation, Incubation и Scaling — не стадии одного конвейера, а три разных ремесла с разными метриками: на идеации важна ясность о клиенте (PR/FAQ), на инкубации — скорость обучения и защита от ядра (изолированные two-pizza команды), на масштабировании — наоборот, доступ к активам и каналам ядра. Компании гибнут на стыках: судят инкубацию по выручке или оставляют выстреливший эксперимент без ресурсов большой машины. <b>Практика:</b> для каждой инициативы явно назови фазу и проверь, что метрики, команда и степень изоляции соответствуют именно ей, а не соседней."},
  {impl:true, th:"disruption", s:"@OReilly", t:"Distance matters: строя будущее, физически отдели инновационную команду от штаб-квартиры — культура ядра убьёт explore-инициативу. И отправь туда сильного лидера, а не «кого не жалко».", d:"Explore-команда внутри штаб-квартиры обречена: её меряют метриками ядра, лучших людей забирают на «горящее», а согласования съедают темп. Классический ход — IBM вынесла разработку PC в отдельную команду в Бока-Ратоне, подальше от корпоративных процессов, и уложилась в год. Вторая типовая ошибка — отправлять в новое «кого не жалко»: организация мгновенно считывает, что ставка несерьёзна. <b>Практика:</b> выноси инициативу структурно и физически, дай ей собственные правила — и отправь туда лидера, потерю которого ядро реально почувствует."},
  {th:"disruption", s:"@OReilly", t:"Ball Corporation с 1880 года: деревянные вёдра → стеклянные банки → жестяные банки → спутники. Радикальная эволюция продукта при сохранении корневой компетенции — способ пережить любой рынок.", d:"Основанная в 1880-м как производитель деревянных вёдер, Ball прошла через стеклянные банки для консервирования (те самые Ball mason jars), жестяные и алюминиевые банки — до Ball Aerospace, строившей спутники и инструменты для космических телескопов. Каждый переход — добровольная смерть старого продукта до того, как он умер сам, при сохранении корневой компетенции в точном производстве ёмкостей и материалов. Мораль О'Райли: продукты смертны, компетенции — нет; компания, определяющая себя через способность, а не через продукт, способна пережить любой рынок."},
  {impl:true, th:"todo", s:"The choice of negotiation", t:"«28:30 — надо послушать» — пометка на аудио/видео фрагменте.", d:"Недописанная пометка из конспекта лекции Маргарет Нил от 5 ноября: <q>28:30 — надо послушать</q> — отсылка к таймкоду аудиозаписи. Стоит она в разделе о цене неумения торговаться, между слайдом <q>зачем вам сотрудник, который не умеет вести переговоры?</q> и блоком Agreement ≠ Success — видимо, там прозвучал сильный фрагмент, который не успелось законспектировать. Чтобы закрыть пометку: найти запись этой сессии, отмотать на 28:30, прослушать фрагмент и дописать инсайт в заметку The choice of negotiation."},
  {impl:true, th:"todo", s:"Getting (more of) what you want", t:"«Главный предиктор успешного брака…» — фраза не окончена.", d:"Оборванная фраза из дебрифа Нил по игре про создание и захват ценности — но ответ в заметке-источнике есть: главный предиктор успешного брака — <b>общность целей и ценностей</b>. Нил использовала это как аргумент в пользу прямой стратегии на congruent-вопросах: когда отношения важнее денег, открытое признание, что нам нужно одно и то же, подчёркивает общность и строит доверие. Чтобы закрыть карточку, достаточно дописать окончание фразы — источник Getting (more of) what you want от 2025-11-05 уже содержит всё нужное."},
  {th:"todo", s:"Corporate Venture Capital", t:"«There was a correlation» — без продолжения.", d:"Обрыв из лекции Ильи Стребулаева о венчурных решениях: он описывал исследование на 500 часах аудио канадского Shark Tank — одна группа кодировала качество ответов основателей, другая, не зная, кто из участников инвестор, фиксировала только его реакцию. <q>There was a correlation</q> — и по контексту заметки связь именно в том, что проваленный ответ на red-flag-вопрос (размер рынка, команда) предсказуемо гасил интерес акулы. Чтобы дописать карточку: свериться с записью или слайдами (в заметке упомянута стр. 42 про red-flag-подход) и зафиксировать, между чем именно корреляция и насколько она сильна."},
  {th:"todo", s:"Disrupting a Market with New Technology", t:"#insight у фото 20251107_104419 без подписи.", d:"Пометка #insight стоит над фотографией слайда 20251107_104419 из лекции Уэсли Хартманна о выводе дисраптивного продукта на рынок (кейс Rachio, умные разбрызгиватели), но подпись к ней так и не написана. Судя по соседним записям, фрагмент был про hype cycle: новые технологии стартуют с пика ожиданий и падают, пока старые конкурируют ценой и ценностью. Чтобы закрыть: открыть фото в хранилище (если iCloud спрятал его как .20251107_104419.jpg.icloud — дождаться докачки), разобрать, что на слайде, и сформулировать инсайт одной-двумя фразами."},
  {th:"todo", s:"The Rise of Activism", t:"#insight у фото IMG-20251101-WA0205 без подписи.", d:"Пометка #insight у фото IMG-20251101-WA0205 из лекции Амита Серу об акционерном активизме — подписи нет. Рядом в конспекте разобран мысленный эксперимент про два мультиверса: активист покупает одни и те же 5% акций, но в одном мире цена растёт, а в другом падает — вся разница в том, верит ли рынок, что влияние активиста пойдёт компании на пользу. Чтобы дописать: открыть фото (это WhatsApp-снимок; при iCloud-эвикции искать .IMG-20251101-WA0205.jpg.icloud), понять, какой слайд или флипчарт на нём, и добавить подпись-инсайт в заметку The Rise of Activism."},
];

const themeName = Object.fromEntries(THEMES);
let activeTheme = null;
let query = "";
let implOnly = false;

const $list = document.getElementById("list");
const $chips = document.getElementById("chips");
document.getElementById("total").textContent = DATA.length;

// В песочнице claude.ai переходы на obsidian:// заблокированы CSP —
// там клик копирует название заметки; из локального файла ссылка работает напрямую.
const CAN_DEEPLINK = location.protocol === "file:";

function obsidianUrl(note) {
  return "obsidian://open?vault=nn&file=" + encodeURIComponent(note);
}

let toastTimer = null;
function copyName(name) {
  const done = () => {
    const t = document.getElementById("toast");
    t.textContent = "«" + name + "» скопировано — в Obsidian нажмите ⌘O и вставьте";
    t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove("show"), 2600);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(name).then(done, done);
  } else {
    done();
  }
}

function matches(item) {
  if (implOnly && !item.impl) return false;
  if (activeTheme && item.th !== activeTheme) return false;
  if (!query) return true;
  const hay = (item.t + " " + (item.d || "") + " " + item.s + " " + themeName[item.th]).toLowerCase();
  return query.split(/\s+/).every(w => hay.includes(w));
}

function render() {
  const found = DATA.filter(matches);
  $list.innerHTML = "";
  if (!found.length) {
    $list.innerHTML = '<p class="empty">Ничего не нашлось по запросу <b></b> — попробуйте короче.</p>';
    $list.querySelector("b").textContent = "«" + query + "»";
    return;
  }
  for (const [key, name] of THEMES) {
    const group = found.filter(i => i.th === key);
    if (!group.length) continue;
    const h = document.createElement("h2");
    h.className = "themehead";
    h.innerHTML = name + ' <span class="cnt"></span>';
    h.querySelector(".cnt").textContent = group.length;
    $list.appendChild(h);
    for (const item of group) {
      const c = document.createElement("article");
      c.className = "card";
      c.dataset.idx = DATA.indexOf(item);
      const p = document.createElement("p");
      p.innerHTML = item.t;
      const meta = document.createElement("div");
      meta.className = "meta";
      const left = document.createElement("span");
      left.className = "leftmeta";
      if (item.impl) {
        const b = document.createElement("span");
        b.className = "impl";
        b.textContent = "внедрить";
        b.title = "Помечено тегом #Implementation — правило действия";
        left.appendChild(b);
      }
      let det = null;
      if (item.d) {
        c.classList.add("hasd");
        det = document.createElement("div");
        det.className = "detail";
        det.innerHTML = item.d;
        const more = document.createElement("button");
        more.className = "morebtn";
        more.setAttribute("aria-expanded", "false");
        more.textContent = "Разбор кейса";
        left.appendChild(more);
        const toggle = () => {
          const open = c.classList.toggle("open");
          more.setAttribute("aria-expanded", String(open));
          more.textContent = open ? "Свернуть" : "Разбор кейса";
        };
        c.addEventListener("click", ev => {
          if (ev.target.closest("a")) return;
          if (window.getSelection && String(window.getSelection())) return;
          toggle();
        });
      }
      meta.appendChild(left);
      const a = document.createElement("a");
      a.className = "src";
      a.href = obsidianUrl(item.s);
      a.textContent = "→ " + item.s;
      a.title = CAN_DEEPLINK ? "Открыть заметку в Obsidian" : "Скопировать название заметки";
      if (!CAN_DEEPLINK) {
        a.addEventListener("click", ev => {
          ev.preventDefault();
          copyName(item.s);
        });
      }
      meta.appendChild(a);
      c.appendChild(p);
      if (det) c.appendChild(det);
      c.appendChild(meta);
      $list.appendChild(c);
    }
  }
}

for (const [key, name] of THEMES) {
  const n = DATA.filter(i => i.th === key).length;
  const b = document.createElement("button");
  b.className = "chip";
  b.setAttribute("aria-pressed", "false");
  b.innerHTML = name + '<span class="n"></span>';
  b.querySelector(".n").textContent = n;
  b.addEventListener("click", () => {
    activeTheme = activeTheme === key ? null : key;
    for (const c of $chips.children) c.setAttribute("aria-pressed", "false");
    if (activeTheme) b.setAttribute("aria-pressed", "true");
    render();
  });
  $chips.appendChild(b);
}

const implChip = document.createElement("button");
implChip.className = "chip implchip";
implChip.setAttribute("aria-pressed", "false");
implChip.innerHTML = '✓ Внедрить<span class="n"></span>';
implChip.querySelector(".n").textContent = DATA.filter(i => i.impl).length;
implChip.title = "Только правила действия (#Implementation)";
implChip.addEventListener("click", () => {
  implOnly = !implOnly;
  implChip.setAttribute("aria-pressed", String(implOnly));
  render();
});
$chips.appendChild(implChip);

document.getElementById("q").addEventListener("input", e => {
  query = e.target.value.trim().toLowerCase();
  render();
});

document.getElementById("rnd").addEventListener("click", () => {
  const pool = DATA.filter(matches);
  if (!pool.length) return;
  const pick = pool[Math.floor(Math.random() * pool.length)];
  render();
  const el = $list.querySelector('.card[data-idx="' + DATA.indexOf(pick) + '"]');
  if (!el) return;
  el.scrollIntoView({ block: "center" });
  el.classList.add("flash");
  setTimeout(() => el.classList.remove("flash"), 1600);
});

render();
</script>

</body>
</html>
