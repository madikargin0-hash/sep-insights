  {th:"creativity", s:"@Wheeler", t:"Прорывы — продукт неэффективного процесса: Флеминг посмотрел на испорченную чашку и сказал «хм?», а не «не получилось». Готовность отвлечься — навык, а не потеря фокуса."},
  {th:"creativity", s:"@Wheeler", t:"Креативность — охота за грибами, а не бухгалтерия: нет операций, гарантирующих результат, есть условия, повышающие вероятность. «Научившись видеть грибы — видишь их везде»."},

  {impl:true, th:"culture", s:"@OReilly", t:"«Круг благодарности»: даже в жёсткий кризис ритуал «за что мы благодарны» сдвигает культуру команды из пессимизма в оптимизм (кейс ливанского финансового кризиса)."},
  {impl:true, th:"disruption", s:"@OReilly", t:"Amazon работает задом наперёд — PR/FAQ: прежде чем строить, напиши пресс-релиз и FAQ будущего продукта. Это форсирует ясность о проблеме клиента, а не о технологии."},
  {impl:true, th:"disruption", s:"@OReilly", t:"Три фазы инноваций — три разные дисциплины: Ideation (PR/FAQ) → Incubation (изолированные «2-pizza» команды, защищённые от ядра) → Scaling (перенос в ядро). Компании путают их — и умирают на стыках."},
  {impl:true, th:"disruption", s:"@OReilly", t:"Distance matters: строя будущее, физически отдели инновационную команду от штаб-квартиры — культура ядра убьёт explore-инициативу. И отправь туда сильного лидера, а не «кого не жалко»."},
  {th:"disruption", s:"@OReilly", t:"Ball Corporation с 1880 года: деревянные вёдра → стеклянные банки → жестяные банки → спутники. Радикальная эволюция продукта при сохранении корневой компетенции — способ пережить любой рынок."},
  {impl:true, th:"todo", s:"The choice of negotiation", t:"«28:30 — надо послушать» — пометка на аудио/видео фрагменте."},
  {impl:true, th:"todo", s:"Getting (more of) what you want", t:"«Главный предиктор успешного брака…» — фраза не окончена."},
  {th:"todo", s:"Corporate Venture Capital", t:"«There was a correlation» — без продолжения."},
  {th:"todo", s:"Disrupting a Market with New Technology", t:"#insight у фото 20251107_104419 без подписи."},
  {th:"todo", s:"The Rise of Activism", t:"#insight у фото IMG-20251101-WA0205 без подписи."},

const themeName = Object.fromEntries(THEMES);
let activeTheme = null;
let query = "";
let implOnly = false;

const $list = document.getElementById("list");
const $chips = document.getElementById("chips");
document.getElementById("total").textContent = DATA.length;

// В песочнице claude.ai переходы на obsidian:// заблокированы CSP —
// там клик копирует название заметки; из локального файла ссылка работает напрямую.
const CAN_DEEPLINK = location.protocol === "file:";

function obsidianUrl(note) {
  return "obsidian://open?vault=nn&file=" + encodeURIComponent(note);
}

let toastTimer = null;
function copyName(name) {
  const done = () => {
    const t = document.getElementById("toast");
    t.textContent = "«" + name + "» скопировано — в Obsidian нажмите ⌘O и вставьте";
    t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove("show"), 2600);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(name).then(done, done);
  } else {
    done();
  }
}

function matches(item) {
  if (implOnly && !item.impl) return false;
  if (activeTheme && item.th !== activeTheme) return false;
  if (!query) return true;
  const hay = (item.t + " " + item.s + " " + themeName[item.th]).toLowerCase();
  return query.split(/\s+/).every(w => hay.includes(w));
}

function render() {
  const found = DATA.filter(matches);
  $list.innerHTML = "";
  if (!found.length) {
    $list.innerHTML = '<p class="empty">Ничего не нашлось по запросу <b></b> — попробуйте короче.</p>';
    $list.querySelector("b").textContent = "«" + query + "»";
    return;
  }
  for (const [key, name] of THEMES) {
    const group = found.filter(i => i.th === key);
    if (!group.length) continue;
    const h = document.createElement("h2");
    h.className = "themehead";
    h.innerHTML = name + ' <span class="cnt"></span>';
    h.querySelector(".cnt").textContent = group.length;
    $list.appendChild(h);
    for (const item of group) {
      const c = document.createElement("article");
      c.className = "card";
      c.dataset.idx = DATA.indexOf(item);
      const p = document.createElement("p");
      p.innerHTML = item.t;
      const meta = document.createElement("div");
      meta.className = "meta";
      if (item.impl) {
        const b = document.createElement("span");
        b.className = "impl";
        b.textContent = "внедрить";
        b.title = "Помечено тегом #Implementation — правило действия";
        meta.appendChild(b);
      } else {
        meta.appendChild(document.createElement("span"));
      }
      const a = document.createElement("a");
      a.className = "src";
      a.href = obsidianUrl(item.s);
      a.textContent = "→ " + item.s;
      a.title = CAN_DEEPLINK ? "Открыть заметку в Obsidian" : "Скопировать название заметки";
      if (!CAN_DEEPLINK) {
        a.addEventListener("click", ev => {
          ev.preventDefault();
          copyName(item.s);
        });
      }
      meta.appendChild(a);
      c.appendChild(p); c.appendChild(meta);
      $list.appendChild(c);
    }
  }
}

for (const [key, name] of THEMES) {
  const n = DATA.filter(i => i.th === key).length;
  const b = document.createElement("button");
  b.className = "chip";
  b.setAttribute("aria-pressed", "false");
  b.innerHTML = name + '<span class="n"></span>';
  b.querySelector(".n").textContent = n;
  b.addEventListener("click", () => {
    activeTheme = activeTheme === key ? null : key;
    for (const c of $chips.children) c.setAttribute("aria-pressed", "false");
    if (activeTheme) b.setAttribute("aria-pressed", "true");
    render();
  });
  $chips.appendChild(b);
}

const implChip = document.createElement("button");
implChip.className = "chip implchip";
implChip.setAttribute("aria-pressed", "false");
implChip.innerHTML = '✓ Внедрить<span class="n"></span>';
implChip.querySelector(".n").textContent = DATA.filter(i => i.impl).length;
implChip.title = "Только правила действия (#Implementation)";
implChip.addEventListener("click", () => {
  implOnly = !implOnly;
  implChip.setAttribute("aria-pressed", String(implOnly));
  render();
});
$chips.appendChild(implChip);

document.getElementById("q").addEventListener("input", e => {
  query = e.target.value.trim().toLowerCase();
  render();
});

document.getElementById("rnd").addEventListener("click", () => {
  const pool = DATA.filter(matches);
  if (!pool.length) return;
  const pick = pool[Math.floor(Math.random() * pool.length)];
  render();
  const el = $list.querySelector('.card[data-idx="' + DATA.indexOf(pick) + '"]');
  if (!el) return;
  el.scrollIntoView({ block: "center" });
  el.classList.add("flash");
  setTimeout(() => el.classList.remove("flash"), 1600);
});

render();
</script>
