<style>
  :root {
    --paper: #FBFAF8;
    --ink: #26211E;
    --muted: #6E6560;
    --line: #E8E3DF;
    --card: #FFFFFF;
    --accent: #8C1515;
    --accent-soft: #F3E6E6;
    --flash: #F9F0E9;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --paper: #1B1715;
      --ink: #EAE4DF;
      --muted: #A3978F;
      --line: #362F2B;
      --card: #241F1C;
      --accent: #D45A5A;
      --accent-soft: #3A2523;
      --flash: #32281F;
    }
  }
  :root[data-theme="dark"] {
    --paper: #1B1715; --ink: #EAE4DF; --muted: #A3978F; --line: #362F2B;
    --card: #241F1C; --accent: #D45A5A; --accent-soft: #3A2523; --flash: #32281F;
  }
  :root[data-theme="light"] {
    --paper: #FBFAF8; --ink: #26211E; --muted: #6E6560; --line: #E8E3DF;
    --card: #FFFFFF; --accent: #8C1515; --accent-soft: #F3E6E6; --flash: #F9F0E9;
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  @media (prefers-reduced-motion: reduce) { html { scroll-behavior: auto; } }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    line-height: 1.55;
  }
  .wrap { max-width: 46rem; margin: 0 auto; padding: 0 1.25rem 5rem; }

  header.masthead { padding: 3.25rem 0 1.5rem; border-bottom: 3px solid var(--accent); }
  .eyebrow {
    font-size: .72rem; letter-spacing: .14em; text-transform: uppercase;
    color: var(--accent); font-weight: 600; margin: 0 0 .6rem;
  }
  h1 {
    font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    font-size: clamp(2.1rem, 6vw, 3rem); line-height: 1.08; margin: 0;
    text-wrap: balance; font-weight: 600;
  }
  .standfirst { color: var(--muted); margin: .8rem 0 0; max-width: 34rem; }
  .standfirst b { color: var(--ink); font-variant-numeric: tabular-nums; }

  .controls {
    position: sticky; top: 0; z-index: 5;
    background: var(--paper);
    padding: .9rem 0 .75rem;
    border-bottom: 1px solid var(--line);
  }
  .searchrow { display: flex; gap: .6rem; }
  .search {
    flex: 1; display: flex; align-items: center; gap: .5rem;
    background: var(--card); border: 1px solid var(--line); border-radius: .4rem;
    padding: .5rem .8rem;
  }
  .search svg { flex: none; color: var(--muted); }
  .search input {
    border: 0; outline: 0; background: transparent; color: var(--ink);
    font: inherit; width: 100%;
  }
  .search:focus-within { border-color: var(--accent); }
  button.random {
    flex: none; border: 1px solid var(--line); background: var(--card); color: var(--ink);
    font: inherit; font-size: .88rem; border-radius: .4rem; padding: .5rem .9rem; cursor: pointer;
  }
  button.random:hover { border-color: var(--accent); color: var(--accent); }
  button.random:focus-visible, .chip:focus-visible, .search input:focus-visible, .src:focus-visible {
    outline: 2px solid var(--accent); outline-offset: 2px;
  }
  .chips { display: flex; flex-wrap: wrap; gap: .4rem; margin-top: .7rem; }
  .chip {
    border: 1px solid var(--line); background: var(--card); color: var(--muted);
    font: inherit; font-size: .8rem; padding: .28rem .7rem; border-radius: 999px; cursor: pointer;
  }
  .chip .n { font-variant-numeric: tabular-nums; opacity: .65; margin-left: .3rem; }
  .chip[aria-pressed="true"] {
    background: var(--accent); border-color: var(--accent); color: #fff;
  }
  .chip[aria-pressed="true"] .n { opacity: .8; }
  .chip:hover:not([aria-pressed="true"]) { border-color: var(--accent); color: var(--accent); }

  .themehead {
    font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    font-size: 1.35rem; font-weight: 600; margin: 2.6rem 0 .2rem;
    display: flex; align-items: baseline; gap: .6rem; text-wrap: balance;
  }
  .themehead .cnt { font-family: inherit; font-size: .95rem; color: var(--muted); font-variant-numeric: tabular-nums; }

  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: .45rem;
    padding: 1rem 1.15rem .85rem; margin-top: .8rem;
    transition: background-color .5s, border-color .3s;
  }
  .card p {
    margin: 0;
    font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    font-size: 1.08rem; line-height: 1.6;
  }
  .card q { color: var(--accent); font-style: italic; quotes: "«" "»"; }
  .meta { display: flex; justify-content: space-between; align-items: center; gap: .5rem; margin-top: .55rem; }
  .impl {
    font-size: .68rem; letter-spacing: .08em; text-transform: uppercase; font-weight: 600;
    color: var(--accent); border: 1px solid var(--accent); border-radius: 999px;
    padding: .1rem .5rem; white-space: nowrap;
  }
  .chip.implchip { border-style: dashed; border-color: var(--accent); color: var(--accent); }
  .chip.implchip[aria-pressed="true"] { border-style: solid; }
  .src {
    font-size: .78rem; color: var(--muted); text-decoration: none;
    background: var(--accent-soft); color: var(--accent);
    padding: .18rem .6rem; border-radius: 999px;
  }
  .src:hover { text-decoration: underline; }
  .card.hasd { cursor: pointer; }
  .detail {
    display: none; margin-top: .7rem; padding-top: .7rem;
    border-top: 1px dashed var(--line);
    font-size: .95rem; line-height: 1.6; color: var(--muted);
  }
  .detail b { color: var(--ink); }
  .card.open .detail { display: block; }
  .leftmeta { display: flex; align-items: center; gap: .7rem; min-width: 0; }
  .morebtn {
    border: 0; background: none; padding: 0; cursor: pointer;
    font: inherit; font-size: .78rem; color: var(--accent); white-space: nowrap;
  }
  .morebtn::after { content: " ⌄"; }
  .card.open .morebtn::after { content: " ⌃"; }
  .card.flash { background: var(--flash); border-color: var(--accent); }
  .empty { color: var(--muted); text-align: center; padding: 3rem 0; }
  .empty b { color: var(--ink); }
  #toast {
    position: fixed; left: 50%; bottom: 1.4rem; transform: translateX(-50%) translateY(120%);
    background: var(--ink); color: var(--paper); font-size: .85rem;
    padding: .55rem 1rem; border-radius: .45rem; max-width: 90vw;
    transition: transform .25s; z-index: 20; text-align: center;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
  @media (prefers-reduced-motion: reduce) { #toast { transition: none; } }
  footer { margin-top: 3.5rem; padding-top: 1rem; border-top: 1px solid var(--line);
    color: var(--muted); font-size: .8rem; }
</style>

<script>
const THEMES = [
  ["strategy", "Стратегия и преимущество"],
  ["innovation", "Инновации и продукт"],
  ["platforms", "Платформы и маркетплейсы"],

// t: текст (допустим <q>цитата</q>), s: заметка-источник
const DATA = [
  {th:"strategy", s:"Strategy", t:"<q>That is the power</q> — власть равна зависимости. Jerry Fiddler (Wind River) отказался продаться GE, дал больше use-cases и построил глубину — и GE, Sun и Motorola сами перешли на его платформу.", d:"Лекция Билла Барнетта о власти в обмене: власть — обратная функция зависимости, и её наращивают, делая других зависимыми от себя. Джерри Фиддлер (Wind River, встраиваемые ОС) отказался продаться GE — а на следующий день ему звонил Джек Уэлч: GE, задумавшая <q>оцифровать весь мир</q>, была вынуждена перейти на его платформу; следом Sun сама прислала людей и деньги на миграцию, а Motorola обнаружила, что давно сидит на его системе. Фиддлер выиграл не размером, а глубиной: множил use-cases и строил лучший product-market fit, пока гиганты не стали зависеть от него."},
  {th:"strategy", s:"Power in exchange relationships is an inverse function of dependence II", t:"<q>Your profit is my opportunity</q> — чужая маржа — твоя возможность.", d:"Из лекции Йеспера Соренсена о переговорной силе: маржа контрагента — карта незахваченной ценности, она показывает, где именно можно откусить себе больше. Канонический пример — Джефф Безос с его <q>your margin is my opportunity</q>: Amazon системно входила в категории, где посредники жили на жирной марже, и забирала её низкими ценами и масштабом."},
  {th:"strategy", s:"Sources of Superior Performance I", t:"Продаёшь не организации, а конкретным людям, которые говорят от её имени.", d:"Соренсен о willingness to pay: у <b>организации</b> нет желаний — решение о покупке принимают конкретные люди со своими KPI, страхами и карьерными ставками. Закупщик боится рискнуть и оказаться виноватым, CTO хочет технологическую победу, финансист защищает бюджет квартала — это три разные продажи одного продукта. Отсюда старая истина enterprise-продаж: <q>никого не увольняли за покупку IBM</q> — покупают не лучший продукт, а безопасный для того, кто подписывает."},
  {th:"strategy", s:"Sources of Superior Performance I", t:"Думай о клиенте клиента: что волнует покупателя твоего покупателя?", d:"Продолжение мысли Соренсена о создании ценности: твой покупатель сам кому-то продаёт, и его willingness to pay определяется проблемами его клиентов. Понимая, за что платят покупателю твоего покупателя, ты продаёшь уже не компонент, а вклад в его выручку. Хрестоматийный пример — Intel Inside: производитель чипов пошёл с рекламой напрямую к конечным пользователям ПК, и сборщикам компьютеров стало выгоднее ставить именно Intel."},
  {th:"strategy", s:"Strategy", t:"<q>You just need to be better</q>. Искать «голубой океан» красиво в теории — реальный мир так не работает.", d:"Барнетт снижает пафос стратегических теорий: искать незанятый <q>голубой океан</q> — красивая идея из учебника, но реальные рынки выигрываются в лоб, в конкуренции Красной Королевы, где соперничество само учит и улучшает компанию. Wind River, Qualcomm, связка iTunes + iPod — все побеждали не уходом от конкуренции, а тем, что были лучше на уже существующем поле. Вместо поиска пустого рынка — строй глубину и product-market fit там, где тебя уже проверяют соперники."},
  {th:"strategy", s:"Sources of Advantage II", t:"Disney: «мы не боимся второго Disney — мы конкурируем с Fortnite». Конкуренция идёт за внимание, а не внутри отрасли.", d:"Из разбора пяти сил Портера у Соренсена: настоящая угроза — не rival из твоей отрасли, а substitute из чужой. Disney на вопрос о конкурентах отвечает: второго Disney мы не боимся — мы дерёмся с Fortnite за одни и те же часы внимания зрителя. Та же логика у Netflix, объявившего своим главным конкурентом сон: границы отрасли рисует не классификатор, а бюджет времени клиента."},
  {th:"strategy", s:"Strategy", t:"Learn &amp; adapt: учиться и адаптироваться, чтобы «строить глубину» и улучшать product-market fit.", d:"Ядро концепции Red Queen Барнетта: конкуренция полезна, потому что заставляет учиться — компания, прошедшая через сильных соперников, сама становится сильнее. Джерри Фиддлер итерация за итерацией наращивал use-cases своей встраиваемой ОС, углубляя product-market fit, пока платформа не стала стандартом для GE и Motorola. Строить глубину — не разовый выбор, а постоянный цикл: получил сигнал рынка → адаптировался → стал лучше."},
  {th:"strategy", s:"Strategy", t:"Дисраптивная стратегия — это логика, убивающая логику прежней бизнес-модели; новая логика даже не похожа на старую.", d:"Барнетт определяет дисрапт не через технологию, а через логику: новая бизнес-модель не улучшает старую, а делает её бессмысленной — и внешне даже не похожа на неё. Alibaba изменила саму механику торговли, а Netflix против Blockbuster — не лучший видеопрокат, а другая система: без штрафов за просрочку, с доставкой по почте и централизованным складом. Поэтому инкумбенты просыпаются поздно: они ищут конкурента, похожего на себя, а убийца выглядит как нечто из другого мира."},
  {th:"strategy", s:"Strategic Leadership", t:"<q>A plan is not a strategy</q> (Roger Martin). Хорошая стратегия отвечает на три вопроса.", d:"Роджер Мартин, которого цитировал Соренсен: план — это список действий, а стратегия — экономическая логика процветания. Хорошая стратегия отвечает на три вопроса: как мы создаём экономическую ценность, какие внешние препятствия мешают её захватить и как наши действия и инвестиции позволят одновременно создавать и захватывать её. Толстый документ годового планирования может не отвечать ни на один — и тогда это не стратегия, а бюджет с амбициями."},
  {impl:true, th:"strategy", s:"Strategic Leadership", t:"Нельзя быть уверенным в стратегии без явной теории того, почему организация выигрывает или проигрывает, — это и есть «logic».", d:"Logic у Соренсена — это предпосылки плюс причины в них верить: явная теория того, почему именно твоя организация выиграет, а не список целей. Без неё невозможно отличить хорошее стратегическое решение от удачного стечения обстоятельств. Практика: сформулируй теорию выигрыша в пару фраз (<q>мы побеждаем, потому что…</q>) и прогоняй через неё каждое решение об аллокации ресурсов — если решение из логики не следует, либо ты ошибаешься сейчас, либо логика устарела и её пора переписать."},
  {impl:true, th:"strategy", s:"Strategic Leadership", t:"Лишь 35% руководителей верят, что стратегия их компании приведёт к успеху.", d:"Цифра из лекции Соренсена о разрыве между формулированием и исполнением стратегии: лишь 35% руководителей верят, что стратегия их компании приведёт к успеху, — то есть две трети исполняют то, во что не верят. Это не проблема мотивации, а симптом отсутствия ясной логики: невозможно верить в то, чего не понимаешь. Практика: анонимно спроси управленческую команду, верят ли они в стратегию и могут ли пересказать её логику в двух фразах — разброс ответов покажет, где стратегия существует только в голове первого лица."},
  {th:"strategy", s:"Strategic Leadership", t:"Масштабные изменения происходят только через организацию.", d:"Тезис Соренсена из вводной по стратегическому лидерству: <q>change lives, change organisations, change the world</q> — но масштабные изменения происходят только через организацию. Одиночка с идеей меняет разговор, организация меняет реальность: у неё есть механизм умножения — люди, системы, культура, капитал. Поэтому стратегическое лидерство — не про личную гениальность, а про выстраивание организации с ясной целью (purpose), способной нести изменение дальше и дольше любого отдельного человека."},
  {th:"strategy", s:"Organizational Growth by Design", t:"Рост — одна из главных причин гибели компаний.", d:"Парадоксальный тезис Барнетта: рост — одна из главных причин гибели компаний, потому что масштабирование до product-market fit превращает дешёвые ошибки обучения в дорогие ошибки масштаба. Хрестоматийный Webvan Луиса Бордерса: доставка продуктов, огромные вложения в распределительные центры до проверки юнит-экономики — и банкротство, по горькой иронии объявленное в день первой прибыли. Правило Барнетта: сначала learning, потом scaling — расти можно только когда понимаешь, почему именно ты выигрываешь."},
  {th:"strategy", s:"Organizational Growth by Design", t:"Нужен whole product — целостный продукт, а не «ядро» без обвязки.", d:"Барнетт разводит MVP и whole product: MVP проверяет гипотезу ценности, но выигрывает целостный продукт — система, в которой сходятся вкус потребителя, удобство и юнит-экономика. Его тест: <q>собака должна сама есть корм</q> — если корм приходится заталкивать, это не product-market fit. Пример целостности — связка iTunes + iPod + iPhone: не устройство, а работающая экосистема, ради которой люди сами выстраивались в очередь."},

  {th:"negotiation", s:"Power in exchange relationships is an inverse function of dependence II", t:"Решения типа A (необратимые) и типа B (обратимые) — различай их до того, как решать.", d:"Соренсен делит решения на два типа: Type A — необратимые, Type B — те, из которых можно выйти, и требует определять тип до принятия решения, потому что им положены разные скорость и глубина анализа. Его пример — Amazon Air: строя собственную авиадоставку, Amazon необратимо портила отношения с FedEx и почтовыми партнёрами — не сыграй ставка, вернуть эти отношения было бы уже нельзя. У Безоса та же идея живёт как one-way и two-way doors: через обратимые двери проходи быстро, перед необратимыми — думай медленно и на высшем уровне."},
  {th:"negotiation", s:"Games People Play", t:"<q>Your pain is my gain</q> возможно лишь по двум причинам: либо злорадство (успех «относительно других»), либо часть большей игры — проиграю сегодня, выиграю завтра.", d:"Йосси Файнберг на игре в угрозы: чистая теория велит уступить, но люди дерутся — и <q>your pain is my gain</q> рационально ровно в двух случаях. Либо это злорадство: человек измеряет успех относительно других и чужой проигрыш ценен сам по себе; либо это часть большей игры — проиграв деньги сегодня, ты покупаешь репутацию бойца, которая отпугнёт следующих претендентов завтра. Поэтому прежде чем счесть поведение контрагента иррациональным, спроси: в какую большую игру он играет?"},
  {th:"negotiation", s:"Mobileye - Bargaining", t:"Стартапы систематически занижают свою цену.", d:"Разбор кейса Mobileye у Файнберга: стартап хотел $50 за чип, OEM предлагал $20, и аудитория интуитивно ждала, что стартап-основатели просят луну. Файнберг опрокинул интуицию: на деле стартапы систематически занижают цену — давят венчурные инвесторы, пугает потеря первого массового контракта, подводит неуверенность в собственной ценности. Mobileye потому и провёл огромное рыночное исследование: чтобы знать точные цифры и не торговаться вслепую."},
  {th:"negotiation", s:"The choice of negotiation", t:"Ставь высокую aspiration: всего не получишь, но и результат, и удовлетворённость будут выше.", d:"Маргарет Нил о трёх опорах переговорщика: альтернатива страхует снизу, reservation price очерчивает границу, а aspiration — оптимистичная оценка достижимого — тянет вверх. Без неё ты якоришься на собственной альтернативе и торгуешься за минимум; с ней в среднем стабильно получаешь больше, даже не дотягиваясь до самой цели. Бонус, который подчёркивала Нил: высокая aspiration повышает и удовлетворённость сделкой, а женщинам она советовала отдельно — ваша планка почти наверняка занижена, поднимите её."},
  {th:"negotiation", s:"The choice of negotiation", t:"Переговорная культура исторически «мужская» — учитывай это в динамике за столом.", d:"Нил показывала, что культура торга исторически строилась вокруг мужского стереотипа напора и рациональности — и стереотипы измеримо влияют на результат. В исследовании Линды Бэбкок стартовые зарплаты выпускников-MBA мужчин оказались на 7,6% выше женских — в основном потому, что мужчины чаще вообще вступали в переговоры; а эксперименты с праймингом стереотипов показывают, что результат лабилен: заданные перед торгом ожидания сдвигают и aspiration, и итог. За столом это стоит учитывать в обе стороны — и в собственном поведении, и в чтении чужого."},
  {th:"negotiation", s:"Getting (more of) what you want", t:"Эксперимент с копиром: просьба с обоснованием («because…») резко повышает согласие — даже если причина тривиальна.", d:"Знаменитый эксперимент Эллен Лангер с копировальной машиной, который Нил приводила как доказательство силы обоснования: простая просьба пропустить без очереди срабатывала в 60% случаев, а просьба со словом because — в 92%. Поразительно, что причина может быть пустой: <q>потому что мне нужно сделать копии</q> работает почти как настоящее объяснение — само наличие обоснования переключает человека из режима подозрительности в режим согласия. Отсюда правило Нил: любое неожиданное поведение в переговорах — экстремальный оффер, мгновенное согласие — сопровождай обоснованием."},
  {th:"negotiation", s:"Getting (more of) what you want", t:"Незнакомцы в Нью-Йорке дают телефон в 6 случаях из 10 — мы сильно недооцениваем готовность людей помогать.", d:"Нил против главного переговорного страха — страха просить: в полевом эксперименте незнакомцы на улицах Нью-Йорка давали свой телефон постороннему в 6 случаях из 10. Мы систематически недооцениваем готовность людей помогать — поэтому не просим скидку, не оспариваем условия, не задаём вопрос и платим за это реальными деньгами. Вывод лекции прямой: проси в любом случае — даже там, где зоны согласия будто нет, по данным Нил около 20% людей легко уступают за пределы собственной нижней границы."},

  {th:"innovation", s:"Think insinde the Box", t:"Новички ищут решения. Правильно — сначала стать кристально ясным в проблеме.", d:"Джонатан Левав начал курс по систематической креативности с парадокса: новичок бросается генерировать решения, хотя рычаг лежит раньше — в формулировке проблемы. На лекции показывали карту авиамаршрутов Бразилии: две компании дублируют одни и те же линии, значит часть пассажиров переобслужена, а часть не обслужена вовсе — точная постановка проблемы уже содержала бизнес-возможность. Размытая проблема плодит красивые ответы на неправильный вопрос; кристальная ясность сама задаёт пространство решений."},
  {th:"innovation", s:"Think insinde the Box", t:"Шаблон subtraction: убери из продукта существенный компонент — и посмотри, что откроется.", d:"Один из шаблонов методики Think Inside the Box: вместо наращивания функций убери компонент, который кажется незаменимым, и посмотри, какая ценность откроется. iPod shuffle убрал экран и стал продавать сюрприз (не знаешь, что заиграет дальше), Nubank убрал отделения, UNIQLO — логотип, рестораны без света продают обострение вкуса. Алгоритм с лекции: выбери продукт, выпиши компоненты и их функции, удали один существенный и свяжи образовавшуюся пустоту с новой функциональностью."},
  {th:"innovation", s:"Think insinde the Box", t:"Мы present-biased: продукт «для будущего», который не виден и не нужен прямо сейчас, покупатель считает бесполезным.", d:"Мы устроены так, что отложенная выгода психологически почти не существует: покупатель реагирует на то, что видит и чувствует сейчас. На лекции контрпримером был Ozempic — он отлично продаётся именно потому, что даёт результат немедленно, а не обещает здоровье через десять лет. Поэтому продукты про устойчивость и долгосрочную экономию надо оборачивать в мгновенную обратную связь — как устройства, которые визуализируют потребление и твой вклад прямо в момент использования."},
  {th:"innovation", s:"Think insinde the Box", t:"Продавай смысл, а не материал: производитель коробок из переработанного пластика продаёт <q>We mold what is important to you</q>.", d:"Самая высокая willingness to pay живёт в психологическом измерении, а не в себестоимости. Производитель коробок из переработанного пластика продаёт не тару, а смысл — <q>We mold what is important to you</q>; а компании, продающие <b>облегчение</b> (relief), вообще выходят из ценовой конкуренции, потому что облегчение бесценно. Вопрос к собственному продукту: сколько стоит желание клиента хорошо выглядеть — в том числе перед его боссом?"},
  {th:"innovation", s:"Disrupting a Market with New Technology", t:"Сегментируй не по демографии, а по роли (геймеры, домовладельцы) и психографике.", d:"В кейсе Rachio (умный контроллер полива) демография почти ничего не предсказывала, а роль и психографика — предсказывали. В классе строили матрицу сегментов не по возрасту и доходу, а по типажам: handy (рукастый), nerdy (технарь), сознательный эко-потребитель — и смотрели, кого уже забрали Nest, Hunter и Orbit, а где остаётся ниша Rachio. Рабочий прокси оказался таким: владелец термостата Nest — почти готовый портрет клиента, хотя ни одна демографическая переменная его не описывает."},
  {th:"innovation", s:"Disrupting a Market with New Technology", t:"Реши заранее: ты контролируешь низкую цену или высокую? Слишком низкая цена вызывает подозрение, даже если качество выше.", d:"Ценовая позиция — решение до выхода на рынок, а не после: ты играешь либо в дешёвый сегмент, либо в премиум, и сменить лагерь потом почти невозможно. Rachio сознательно встали в премиум $199–249, заякорившись на термостат Nest ($249), а когда Orbit вышел с ценой $99, отказались снижаться: дешёвый конкурент — другой продукт для другого сегмента. Контринтуитивный момент: слишком низкая цена не расширяет рынок, а включает подозрение — даже если качество объективно выше."},
  {impl:true, th:"innovation", s:"Disrupting a Market with New Technology", t:"Цикл «пропасти» ~12 лет; полагаться только на ранних последователей — застрять в цикле chasm.", d:"По Джеффри Муру между ранними последователями и прагматичным большинством лежит пропасть, и на лекции звучала оценка: полный цикл её преодоления — порядка 12 лет. Компания, живущая только на энтузиастах (им хватает 80%-го решения, они любят новизну саму по себе), раз за разом упирается в исчерпание сегмента — это и есть цикл chasm. Tesla прошла его сменой бизнес-модели: Roadster для пионеров, Model S для прогрессивных, Model 3 для массового рынка — через production hell. Практика: заранее готовь предложение для прагматиков — 100%-е решение, гарантии и референсы от таких же, как они, — как Airbnb, которая пробила пропасть миллионной гарантией хозяевам."},
  {th:"innovation", s:"Disrupting a Market with New Technology", t:"Новые технологии стартуют с пика ожиданий, потом падают.", d:"Это hype cycle: технология рождается на пике завышенных ожиданий — пресса пишет, что мир изменится через 3–5 лет, — затем первый продукт не оправдывает обещаний, и наступает «похмелье» с разговорами о провале (классика — крах NASDAQ в 2000-м). Реальная ценность приходит потом, медленным подъёмом, когда настоящие клиенты находят настоящую пользу; при этом зрелые технологии конкурируют уже не хайпом, а ценностью и издержками. Вывод лектора: пропусти хайп и строй на ценности с первого дня."},
  {th:"innovation", s:"Disrupting a Market with New Technology", t:"Новая категория невидима в поиске (умные разбрызгиватели — не top-of-mind), поэтому своё приложение, релевантное продукту и value proposition, — big thing.", d:"Новая категория не существует в голове покупателя — а значит, и в поиске: никто не гуглит умный разбрызгиватель, а поисковики и маркетплейсы ранжируют по релевантности запросу. Rachio упёрлись ровно в это: платить за рекламу, чтобы казаться релевантным чужому запросу про умный дом, безумно дорого. Отсюда вывод: собственное приложение — не игрушка, а канал, где ты сам задаёшь релевантность своему продукту и value proposition, и при этом ежедневно живёшь на экране клиента."},
  {th:"innovation", s:"The Innovation Process 1 Product Market Fiе", t:"«Как создать новую ценность для существующего клиента?» — создавай взаимодействие («чтобы собака захотела корм»).", d:"Стефанос Зениос: мало сделать хороший корм — нужно, чтобы собака захотела его есть, то есть спроектировать взаимодействие, втягивающее существующего клиента в новую ценность. Boeing с 787 действовал именно так: подход sell-design-build — сначала показать дизайн авиакомпаниям, собрать комментарии, изменить конструкцию и получить заказы (планка была минимум 10, собрали более 50), и только потом строить самолёт."},
  {impl:true, th:"innovation", s:"Creativity in the Business Ecosystem", t:"Oatly начали с бариста (овсяное молоко лучше пенится) — точный выбор клина для входа на рынок.", d:"Oatly не пошли в супермаркеты воевать с коровьим молоком — они выбрали клин: бариста, потому что овсяное молоко лучше пенится и решает конкретную профессиональную боль. Кофейни стали одновременно доказательством качества и витриной: потребитель пробует продукт в латте у авторитетного бариста, а не на полке среди сотни брендов. Практика: для входа на рынок ищи узкий сегмент, где твоё преимущество максимально ощутимо, а сам сегмент служит инфлюенсером для остальных."},
  {th:"innovation", s:"Creativity in the Business Ecosystem", t:"Samsung создал рутину и пространство, где «искрит» творчество, → 60 патентов за год. Творчество — процесс, а не вдохновение.", d:"Контрпример мифу о вдохновении: Samsung построил рутину — регулярный процесс и специальное пространство, где «искрит», — и получил 60 патентов за год. Творчество в организации — это управляемый процесс с расписанием, помещением и правилами, а не ожидание, пока на кого-то снизойдёт. Тезис перекликается с Boden из ридинга курса: креативность — механизм, который можно воспроизводить, а не миф о гении."},
  {impl:true, th:"innovation", s:"Creativity in the Business Ecosystem", t:"P-creativity vs H-creativity: «новое для тебя» часто уже известно многим — проверяй.", d:"Различение Маргарет Боден из ридинга курса: P-creativity — ново для тебя лично, H-creativity — ново для человечества. Опасность в том, что психологически новое ощущается как исторически новое: идея опьяняет, хотя рынок её уже пробовал и, возможно, похоронил. Практика: до вложений прогони идею через проверку — патенты, конкуренты, умершие стартапы с тем же питчем — и пойми, почему у них не получилось, прежде чем считать идею своей находкой."},
  {th:"innovation", s:"Creativity in the Business Ecosystem", t:"Новый проект начинай с максимальной цены, но артикулируй, почему дорого («металл как для космических кораблей»).", d:"Стартуй новый проект с максимальной цены, но с артикулированной легендой дороговизны: пример с лекции — <q>металл как для космических кораблей</q>, фраза, мгновенно оправдывающая премиум. Логика проста: снизить цену потом легко, поднять — почти невозможно, а высокая цена сама сигналит качество, если объяснено, за что. Так и Rachio заякорили $199–249 на премиальном Nest вместо сравнения с таймерами за $50."},
  {th:"innovation", s:"Creativity in the Business Ecosystem", t:"Приём «пресс-конференция заранее»: сформулируй, что объявишь по итогам, — сразу поймёшь, стоит ли это делать.", d:"Приём предварительной пресс-конференции: до старта проекта сформулируй, что именно объявишь миру по его итогам, — если объявление звучит блёкло, проект не стоит запускать. Это ровно механика Amazon working backwards (PR/FAQ): команда пишет пресс-релиз будущего продукта до первой строчки кода, что форсирует ясность о ценности для клиента, а не о технологии. Дешёвый фильтр, отсекающий месяцы работы над тем, о чём нечего рассказать."},
  {th:"innovation", s:"Creativity in the Business Ecosystem", t:"Смена парадигмы рынка: «они превратили рынок железа в рынок софта».", d:"Высшая форма инновации — сменить парадигму, на которой стоит рынок: <q>они превратили рынок железа в рынок софта</q>. Ценность и маржа уезжают из атомов в код: у Rachio контроллер — лишь носитель алгоритмов полива, поэтому ответ на дешёвые клоны — не гонка фич, а модель hardware-enabled services с платными программными сервисами; Apple тем же ходом превратила телефон в платформу приложений. Когда конкуренты копируют железо, парадигма софта оставляет их в прошлой игре."},
  {th:"innovation", s:"Developing a Business Model I", t:"Избегай продуктов, требующих behaviour modification, — менять привычки людей труднее всего.", d:"Хайм Мендельсон: самый тяжёлый барьер адопции — необходимость менять привычки, поэтому продукты, требующие behaviour modification, лучше обходить стороной. Airbnb годами упирался в этот барьер со стороны хозяев — пустить незнакомца в свой дом — и пробил его не уговорами, а снятием риска: гарантия хозяину на миллион долларов, выросшая позже в AirCover. Крайний случай с лекции — имплантируемый Bluetooth: висцеральное отторжение мгновенно, и никакая ценность его не перекрывает."},
  {th:"innovation", s:"Developing a Business Model I", t:"Клиентов приводят удобство, характер опыта и цена — причём цена фактор №1.", d:"Разбор Airbnb: гостей приводят удобство, характер опыта — жить в квартире как местный — и цена, причём именно цена оказалась фактором номер один: жильё было примерно на 30% дешевле отелей. Отрезвляющий вывод для строителей уникального опыта: аутентичность работает, но масштаб дал банальный ценовой разрыв. Проверяй, на чём реально держится твой приток клиентов, а не на чём хочется думать."},

  {impl:true, th:"innovation", s:"Disrupting a Market with New Technology", t:"Value–customer fit: проверяй соответствие ценности конкретному сегменту клиентов, а не «рынку вообще».", d:"Value-customer fit — уточнение product-market fit: ценность проверяется не на рынке вообще, а на конкретном сегменте, потому что одна и та же фича для одного сегмента золото, для другого — шум. В кейсе Rachio строили матрицу «мы и враги»: сегменты (рукастые, технари, эко-сознательные) против игроков — Nest, Hunter, Orbit, Rainbird — и искали клетку, где ценность Rachio уникальна. Практика: выпиши сегменты по ролям, отметь, чью ценность каждый уже получает от конкурентов, и бей туда, где твоя ценность совпадает с сегментом, а конкурентная — нет."},
  {impl:true, th:"platforms", s:"The Grand Bazaar on Clouds.", t:"<q>Google made money from the air</q> — поисковая реклама монетизирует само намерение, «воздух»: актив, которого раньше не существовало.", d:"Лекция Мохаммада Акбарпура о дизайне рынков: до поисковой рекламы намерение покупателя вообще не было активом — Google превратил сам запрос в товар и продаёт позиции в выдаче через аукцион, зарабатывая на этом сотни миллиардов в год. Клик по запросу иммиграционного юриста в Пало-Альто стоит порядка ста долларов, потому что ставка равна вероятности покупки, умноженной на ценность клиента. <b>Применение:</b> ищи в своём бизнесе такой же воздух — момент, когда клиент уже проявил намерение, но его никто не монетизирует: поисковая строка, очередь, точка выбора."},
  {th:"platforms", s:"The Grand Bazaar on Clouds.", t:"Маркетплейс с долей рынка меньше 20% не выживает.", d:"Маркетплейс живёт на ликвидности (thickness): покупатель идёт туда, где много продавцов, и наоборот, поэтому ниже критической массы маховик просто не раскручивается — пользователь заходит и не находит контрагента. Отсюда пример Craigslist из лекции: чудовищный интерфейс, но миллиарды выручки, потому что ликвидность бьёт UX. Практический вывод: рынок маркетплейсов терпит одного-двух игроков, и если не видишь пути к крупной доле — не заходи или уходи в вертикаль."},
  {th:"platforms", s:"The Grand Bazaar on Clouds.", t:"Чем больше продавцов в петле, тем сильнее конкуренция — и тем несчастнее продавцы.", d:"У маркетплейса два вида сетевых эффектов: перекрёстный положительный (больше предложения — больше спроса) и внутристоронний отрицательный — новые продавцы конкурируют со старыми и сбивают цены. Каждый новый хост Airbnb радует гостей и злит соседних хостов; тот же эффект в лекции иллюстрировали растущей конкуренцией мужчин в дейтинг-пуле. Именно отрицательный эффект объясняет, почему Uber и Lyft сосуществуют и почему платформа не может бесконечно раздувать сторону предложения — обе стороны приходится балансировать."},
  {th:"platforms", s:"The Grand Bazaar on Clouds.", t:"Ниша против гиганта: YouTube не победить, но можно сделать видеохостинг для геймеров и музыкантов — так появился Twitch.", d:"Против платформы с сетевыми эффектами лобовая атака бессмысленна, но у гиганта всегда есть недообслуженные подгруппы. Геймеры и музыканты хотели живых трансляций, которые YouTube толком не поддерживал, — под них построили специализированный продукт, и так вырос Twitch. Тот же приём — <b>вертикализация горизонталей</b>: eBay Motors вырос, забрав одну категорию у безразмерного Craigslist."},
  {th:"platforms", s:"The Grand Bazaar on Clouds.", t:"Airbnb: дискриминация по именам и трение при бронировании (отель был проще) → ответ: instant booking.", d:"Кейс о том, что архитектура платформы решает социальные проблемы лучше деклараций: хосты Airbnb отклоняли гостей с неудобными именами, а бронирование с одобрением проигрывало отелю по трению. Ответ — instant booking плюс <b>процедура</b> вместо запрета: алгоритм ранжирования поднимал хостов с мгновенным бронированием в выдаче — дешёвый архитектурный стимул из тройки Policies, Procedures, Prices. Акбарпур, сам носитель имени из группы риска, добавлял с горькой иронией: решение перенесло дискриминацию с экрана на порог дома — дизайн рынка требует постоянного мониторинга побочных эффектов."},
  {th:"platforms", s:"The Grand Bazaar on Clouds.", t:"Amazon зарабатывает на sponsored ads больше, чем кажется со стороны, — реклама как главный источник маржи маркетплейса.", d:"Розничная маржа маркетплейса тонкая, а рекламные деньги — почти чистая прибыль: продавцы, дерущиеся за полку, платят за sponsored-позиции больше, чем платформа зарабатывает на самих транзакциях. Механика усиливается аукционом: когда в торгах за место участвует и сам Amazon со своими товарами, вторая цена подтягивается вверх — платформа создаёт себе ценность самим устройством торгов. Ретейл-медиа — тихий центр прибыли: снаружи Amazon выглядит магазином, внутри всё больше похож на рекламную компанию."},
  {impl:true, th:"platforms", s:"The Grand Bazaar on Clouds.", t:"Аукцион второй цены (Vickrey): победитель платит цену второго — механика, создающая ценность платформе.", d:"Закрытый аукцион, где победитель платит вторую по величине ставку, снимает главную головную боль торгов: занижать ставку бессмысленно, и доминантной стратегией становится честно назвать свою истинную ценность. Именно поэтому механика Викри легла в основу интернет-рекламы Google и Meta — она делает торги агрессивнее и открывает платформе реальные оценки покупателей. Акбарпур предупреждал: <q>If this does not blow your mind, you have no emotions</q>. <b>Применение:</b> когда не знаешь готовности платить — при продаже актива, в тендере, при распределении дефицитного ресурса внутри компании — формат второй цены вытащит из участников правду."},

  {th:"finance", s:"Accounting for valuation and control", t:"Cash flow не рассказывает всю историю.", d:"Курс Морин Макниколс по учёту начинается с ловушки: отчёт о движении денег показывает, сколько пришло и ушло, но молчит о том, откуда и какой ценой. Компания может красиво генерить кэш, задерживая платежи поставщикам, распродавая запасы или недоинвестируя, — увидеть это можно только в связке всех четырёх отчётов: баланса, P&L, кэш-флоу и движения капитала. Ровно поэтому существует учёт по начислению: прибыль и денежный поток отвечают на разные вопросы, и читать их нужно вместе."},
  {th:"finance", s:"Accounting for valuation and control", t:"Менеджеры, понимающие маркетинг, растят выручку; понимающие учёт — прибыль.", d:"Исследовательский вывод из курса Макниколс о разделении труда в голове менеджера: маркетинг учит видеть, где растёт выручка, а учёт — где она утекает. Рост продаж без понимания себестоимости, оборотного капитала и структуры затрат легко оказывается убыточным ростом. Сильная связка — руководитель, умеющий и создавать спрос, и читать баланс: первое двигает выручку, второе превращает её в прибыль."},
  {th:"finance", s:"Accounting for valuation and control", t:"Округа с бóльшим числом бухгалтеров растут быстрее — даже после контроля обратной причинности.", d:"Неожиданный макроаргумент в пользу скучной профессии: округа США с большей концентрацией бухгалтеров растут быстрее, и эффект сохраняется даже после контроля обратной причинности — то есть дело не в том, что богатеющие округа просто нанимают больше учётчиков. Логика: достоверная отчётность — инфраструктура доверия; она удешевляет капитал и делает возможными кредит и инвестиции между незнакомыми людьми. Учёт — не накладной расход, а актив экономики."},
  {th:"finance", s:"Financial innovation", t:"Всегда смотри и NPV, и IRR.", d:"Де Марцо разбирает три греха IRR: метрика ломается при нестандартных денежных потоках (плюс перед минусом, несколько смен знака), игнорирует масштаб — 1000% на одном долларе хуже, чем 50% на миллионе — и подводит при сравнении проектов разной длительности. NPV лишён этих багов и меряет созданную ценность в деньгах, зато IRR даёт интуитивную доходность для разговора с советом директоров. Правило простое: считай обе метрики, а при расхождении верь NPV."},
  {th:"finance", s:"Financing Innovation - Strategic value creation", t:"Чаще всего ты заранее не знаешь, откуда именно вернутся деньги.", d:"Урок Де Марцо о финансовом моделировании: все прогнозные допущения гарантированно неверны, поэтому ценность не в итоговой цифре NPV, а в самой модели — она показывает, какие драйверы реально двигают результат. В кейсе NetPhone рост доли рынка с 20% до 30% больше чем удваивал NPV — заранее не угадаешь, какой рычаг выстрелит. Отсюда логика реальных опционов: разбивай инвестицию на стадии, как в разработке лекарств, и создавай ценность не точным прогнозом, а правом вовремя остановиться или удвоить ставку на победителя."},
  {th:"finance", s:"Corporate Venture Capital", t:"Корпоративные венчурные фонды: 97% умирают в течение 3 лет.", d:"Илья Стребулаев о корпоративном венчуре: подавляющее большинство CVC-фондов умирает раньше, чем успевает хоть что-то доказать, тогда как путь стартапа до единорога занимает в среднем около 7,5 лет. Корпорация меряет фонд квартальными горизонтами, сажает в инвесткомитет CEO и CFO, далёких от венчурной логики, и тонет в медленных решениях — а стартап не ждёт. Выживают CVC, устроенные как настоящие VC: маленькие комитеты, право на несогласие, терпеливый капитал на длинный горизонт."},
  {th:"finance", s:"Private Equity and Shareholder Maximization", t:"Консультанты «всегда» приносят премию ~30% за поглощение — относись к числу скептически.", d:"Амит Серу о механике сделок M&A: у консультантов и банкиров всегда находится обоснование премии около 30% к рыночной цене — потому что их гонорар зависит от закрытия сделки, а не от её успеха. Свежий пример из лекции: покупка Twitter Маском прошла с той же канонической премией порядка 30%. Мораль: стандартная премия — не оценка синергии, а конвенция индустрии; прежде чем платить, проверь, из чьих стимулов родилось число."},

  {impl:true, th:"leadership", s:"Living up to Your Values", t:"Кажется, что у всех всё легко, — на деле все «гребут изо всех сил» под водой.", d:"Феномен <b>pluralistic ignorance</b> из лекции Кеннета Шоттса: каждый сравнивает свои внутренние сомнения с чужими уверенными фасадами и решает, что проблема только у него. Отсюда метафора утки — над водой безмятежное скольжение, под водой отчаянная гребля; так живут и первокурсники Стэнфорда, и топ-менеджеры. Применение: лидер первым признаёт свои трудности — это легализует честный разговор в команде; и спрашивай людей не <q>всё ли в порядке</q>, а что именно сейчас даётся труднее всего."},
  {impl:true, th:"leadership", s:"Living up to Your Values", t:"Молчание ≠ согласие: после встречи люди остаются при своих мнениях.", d:"Классика конформности: если все вокруг вслух дают неверный ответ, человек в большинстве случаев присоединяется — но достаточно одного несогласного, чтобы люди начали говорить правду. В переговорной то же самое: лидер выходит со встречи с ощущением единодушной поддержки (<b>false consensus</b>), а несогласные просто промолчали и остались при своих — решение потом тихо буксует. Применение: собирай позиции явно — поимённый опрос, письменные возражения до общего обсуждения, назначенный оппонент, — иначе тишину ты прочитаешь как «да»."},
  {impl:true, th:"leadership", s:"Living up to Your Values", t:"Сила контекста (Милгрэм): обычный человек «бьёт током» за неверный ответ; группа и контекст заставляют рисковать жизнью.", d:"В эксперименте Милгрэма обычные люди по команде экспериментатора повышали <q>наказание током</q> до отметки 440 вольт — актёр-«ученик» кричал за стеной, а «учителя» продолжали нажимать. Вывод Шоттса: поведение определяет не характер, а контекст — та же сила, что заставляет причинять боль, в другой рамке заставляет людей в группе рисковать жизнью ради своих. Применение: не полагайся на то, что нанял «хороших людей», — проектируй контекст: кто рядом, кто отдаёт команды, что считается нормой, и обязательно встрой легитимный способ сказать «стоп» тому, кто выше."},
  {impl:true, th:"leadership", s:"Living up to Your Values", t:"Кейс GM: уволили всех и наняли заново (прошли 80%) — жёсткий перезапуск культуры сработал.", d:"Руководство GM признало: завод выпускает ужасные машины, и дело не в оборудовании, а в устоявшихся нормах поведения. Ход радикальный — уволили всех и наняли заново через отбор, который прошли около 80%; те же люди на том же заводе начали собирать качественные автомобили. Мораль: культура сидит не «в людях вообще», а в негласном контракте ожиданий, и иногда честнее переподписать его заново, чем годами чинить. Применение: при перезапуске культуры меняй сам ритуал входа — новые правила должны быть явно приняты каждым, а не «доведены рассылкой»."},
  {impl:true, th:"leadership", s:"Living up to Your Values", t:"Назначай людям роли — качество решений вырастет.", d:"Группа без ролей скатывается к разговору статусов: громкие говорят, осторожные молчат, и решение принимает иерархия, а не аргументы. Назначенная роль — адвокат дьявола, хранитель рисков, голос клиента — даёт человеку право возражать «по должности», а не от себя лично, и это резко снижает цену несогласия. Шоттс добавляет: иногда полезно наложить на людей ограничения, чтобы команда в итоге выиграла. Применение: перед важным решением раздай роли явно и ротируй их от встречи к встрече, чтобы амплуа скептика не приросло к одному человеку."},
  {impl:true, th:"leadership", s:"Leading by Design", t:"У каждого должен быть план развития: менеджер обязан понимать твой путь на 3–5 лет; внезапный уход сотрудника — минус менеджеру.", d:"В модели лидерской компетентности Билла Барнетта работа с людьми — это архитектура, а не реакция на заявления об уходе: менеджер обязан понимать, где его сотрудник будет через 3–5 лет, и строить этот путь вместе с ним. Тогда даже уход человека — спланированное событие, а внезапное «я ухожу» — провал менеджера, который проспал своего человека. Применение: заведи на каждого прямого подчинённого письменный план развития и возвращайся к нему регулярно, а в оценку самих руководителей включи внезапные уходы как красный флаг."},
  {th:"leadership", s:"Leading by Design", t:"Мы ценим «сейчас» больше, чем тот же момент в будущем, — поэтому и игнорируем устойчивость.", d:"Это <b>present bias</b>: одно и то же удовольствие или одна и та же боль «сейчас» весят для нас больше, чем в будущем. Поэтому диета начинается с понедельника, а инвестиции в устойчивость, культуру и долгие ставки стабильно проигрывают квартальному результату — не потому что менеджеры глупы, а потому что так устроено наше дисконтирование времени. Ответ Барнетта — проектный: строй систему так, чтобы длинные решения не зависели от силы воли отдельного человека, а были встроены в процессы и метрики."},
  {th:"leadership", s:"Leading Team. Team Work", t:"Часть обучения — автоматизация навыка.", d:"На лего-упражнении Брайана Лоуэри команды теряли продуктивность просто от того, что работали рядом друг с другом: присутствие людей само по себе съедает когнитивный ресурс — это <b>ability loss</b>, один из видов process loss. Спасение — автоматизация: навык, доведённый до автоматизма, ресурса почти не требует, и публика даже улучшает исполнение, тогда как сложные неотработанные задачи под наблюдением разваливаются. Поэтому тренировка — не «понять один раз», а повторять до автоматизма: это и есть часть обучения."},
  {th:"leadership", s:"Strategy", t:"Люди эмоциональны: страх выглядеть дураком сильнее надежды оказаться гением.", d:"Барнетт: мы ведём людей, а люди эмоциональны, и в матрице «консенсус/неконсенсус» страх оказаться в клетке <q>cringy</q> сильнее надежды попасть в голубой океан. Его пример — Qualcomm: ставку Джейкобса на CDMA отрасль считала почти безумием, неконсенсусная идея выглядела глупостью ровно до момента, когда стала стандартом. Поэтому смелые идеи умирают не на этапе анализа, а на эмоции «вдруг я буду выглядеть дураком» — и лидер должен управлять именно этим страхом."},
  {th:"leadership", s:"Strategy", t:"Босс-«консенсусник» = нет новых идей. Отбрасывая неконсенсусные идеи, выбрасываем и гениальные. Позволяй людям быть «глупыми» — вариация и отбор, как в эволюции.", d:"Логика прямо из теории эволюции: отбор работает только там, где есть вариации. Отфильтровывая «глупые» идеи на входе, босс-консенсусник вместе с мусором выбрасывает и гениальное — на ранней стадии они неотличимы. Барнетт предлагает быстрый тест компании: знают ли люди, зачем они здесь, и боятся ли принимать неконсенсусные решения; если боятся — новых идей не будет, останется только красный океан улучшений."},
  {th:"leadership", s:"Strategy", t:"«Америка меня не свергнет, а Facebook может» (приписывается Асаду) — сила сетей против иерархий.", d:"Иерархию можно обезглавить — сеть нет: у неё не существует узла, удаление которого её останавливает. Фраза, приписываемая Асаду, точно схватывает эту асимметрию: государство умеет бороться с армиями и партиями, но распределённая сеть мобилизуется быстрее, чем вертикаль успевает отреагировать. Барнетт приводит её в теме математики сетей: по той же причине компании-платформы, растущие сетевыми эффектами, систематически обыгрывают классические корпорации-иерархии."},
  {th:"leadership", s:"Decision making", t:"«Чудо на Гудзоне» (Салленбергер) — эталонный кейс принятия решений под давлением.", d:"Январь 2009-го, рейс US Airways 1549: стая птиц глушит оба двигателя над Нью-Йорком, и у Салленбергера есть считаные минуты; он отвергает возврат в аэропорт, сажает лайнер на Гудзон — выживают все 155 человек на борту. Леваф разбирает кейс как эталон: качество решения определяется процессом, а не только исходом — Салли сработал на отточенных до автоматизма процедурах и трезвом переборе вариантов под предельным давлением. И отдельный урок коммуникации: мы привязаны к историям, поэтому один такой кейс учит организацию лучше, чем стопка регламентов."},

  {th:"communication", s:"Communication", t:"До выступления оцени уровень знаний аудитории по теме (high/low).", d:"Первый шаг модели <b>CASE</b> — ясность аудитории: выступление без адресата профессор сравнивает с любовным письмом, адресованным «тому, кого это может касаться». Уровень знаний по теме (high/low) — первый из четырёх факторов анализа наряду с установками, сопротивлением и мотивацией: от него зависят язык, глубина и объём вводной части. Не знаешь уровня — это не оправдание, а задача: опрос, короткие звонки, изучение профилей и публикаций слушателей."},
  {th:"communication", s:"Communication", t:"Покажи, что думал об аудитории, — это создаёт credibility.", d:"Для смешанной аудитории у профессора есть готовый приём: вслух признай разброс экспертизы и скажи, что с ним сделаешь — например, <q>первые три-четыре минуты дам основы, а дальше пойдём на продвинутом уровне</q>. Это снимает раздражение сразу и у новичков, и у экспертов, но главное — аудитория видит, что ты готовился именно к ней. Credibility рождается не из регалий спикера, а из видимых следов работы над пониманием слушателя."},
  {th:"communication", s:"Communication", t:"Формула цели Do-Feel-Do: что сделать → что почувствовать → что сделать.", d:"Точная формула из лекции — <b>Know–Feel–Do</b>: что аудитория должна узнать, что почувствовать и что конкретно сделать. Эмоция здесь не украшение: она <q>заходит быстрее, держится дольше и мотивирует поведение</q>. Типичная ошибка — размытое действие: «прошу вашей поддержки» вместо конкретного «выписать чек», «поставить лайк», «открыть свою записную книжку контактов». Бонус: ясная цель даёт мерило успеха — узнали ли, почувствовали ли, готовы ли сделать."},
  {th:"communication", s:"Communication", t:"Связки «next, second, third» — слабые переходы: на них теряют людей. Нужны сильные мосты «откуда → куда».", d:"Метафора лекции — экскурсовод: он не объявляет «следующая достопримечательность», а связывает, откуда группа пришла и куда идёт дальше. «Next, second, third» — это просто нумерация: логической связи нет, и именно на таких стыках аудитория достаёт телефоны. Сильный мост звучит иначе: «мы разобрались, во что проблема обходится, — теперь посмотрим, что с ней делать» — смысл переносится через стык, а не теряется на нём."},
  {th:"communication", s:"Communication", t:"Структура — GPS аудитории: без неё люди уходят в телефоны или спят.", d:"Большинство презентаций — «франкен-мешок» из старых слайдов и списков буллетов, а неструктурированные списки мозг не удерживает: по приведённым в лекции данным когнитивной психологии, структурированная информация запоминается на 40% лучше. Отсюда три рабочих каркаса: Problem–Solution–Benefit для убеждения, What–So What–Now What для информирования, Past–Present–Future для вдохновения. Объяви маршрут в начале, как экскурсовод, — и людям не понадобится телефон, чтобы «сходить погулять» посреди твоего доклада."},
  {th:"communication", s:"Communication", t:"Не «глуши» цифрами: числу нужен контекст ($X впечатляет меньше, чем «25% всех денег мира»).", d:"<q>Don't numb your audience with numbers</q> — не глуши аудиторию цифрами: голое число ничего не значит, пока мозгу не к чему его привязать. Пример из лекции: внушительная сумма в долларах впечатляет меньше, чем формулировка «четверть всех денег мира». Число становится аргументом только рядом с базой сравнения — средним по отрасли, прошлым годом или бытовым эквивалентом, который слушатель может себе представить."},
  {th:"communication", s:"Communication", t:"Support (примеры, цифры) — способ занести нужную эмоцию в сообщение.", d:"Support — не «доказательства ради строгости», а транспорт для эмоции из формулы Know–Feel–Do. Три типа поддержки — чужое свидетельство (testimony), примеры-истории и данные — цепляют разных людей, поэтому нужно разнообразие: история заносит тревогу в блок проблемы, демонстрация — уверенность в блок решения, цифра — азарт в блок выгоды. Расставляй их по структуре сознательно, как краски по холсту, а не как сноски в конце."},
  {th:"communication", s:"Communication", t:"MVC — Minimally Viable Communication: минимально достаточная коммуникация.", d:"Профессор переносит на коммуникацию логику MVP: <q>первая встреча твоего сообщения с аудиторией не должна быть его первой доставкой</q>. Рецепт: сожми выступление до одного предложения на каждый блок структуры и протестируй этот конспект на людях из аудитории или тех, кто её хорошо знает, — даже неэксперт ловит места, где сообщение буксует. Итерации до выхода на сцену стоят копейки по сравнению с провалом на ней."},

  {th:"ai", s:"AI turbo session + Working in teams", t:"Скорость адопции беспрецедентна: ChatGPT достиг 30% проникновения за 60 дней (электричеству и телефону нужны были десятилетия).", d:"Скорость диффузии технологии — сама по себе стратегический фактор. Электричество и телефон добирались до трети населения десятилетиями, и общество успевало перестроить законы, профессии и привычки; ChatGPT прошёл тот же путь за два месяца. Это значит, что переходный период, в котором раньше умещалась целая карьера, теперь сжат до одного бюджетного цикла: адаптироваться <b>после</b> того, как технология стала мейнстримом, уже поздно. Отсюда и беспрецедентная тревога вокруг ИИ — люди впервые переживают технологический сдвиг быстрее, чем успевают его осмыслить."},
  {th:"ai", s:"AI turbo session + Working in teams", t:"Не «больше данных», а «лучше данных»: публичные данные исчерпаны, следующая ценность — за корпоративными файрволами (медицинская модель: 92,6% точности на 1 800 тюнинг-элементах и 40 экспертных примерах).", d:"Гонка за объёмом данных закончилась: публичный интернет уже выскоблен, и следующее преимущество лежит в качестве, а не в количестве. На лекции разобрали медицинскую модель Google: обученная на огромном массиве, она отвечала на уровне около 60% — недопустимо для врача; после дообучения всего на 40 образцовых примерах клиницистов и 1800 тюнинг-элементах, задающих <b>способ мышления</b>, точность подскочила до 92,6%. Вывод для компаний: ваш самый ценный ИИ-актив — проприетарные данные за файрволом, включая архив неудач, ведь <q>999 вещей, которые не сработали</q>, стоят не меньше одной сработавшей."},
  {th:"ai", s:"AI turbo session + Working in teams", t:"Transformer родился из ошибки (инженер перепутал «Kanada» и «Kannada») — прорывы дают ошибки и комбинаторика, а не линейный прогресс.", d:"История трансформера — урок о природе прорывов. Инженер Google Translate опечатался в коде языка, перепутав Kanada и Kannada, и модель неожиданно показала скрытый уровень связности, который никто не закладывал, — из этого наблюдения выросла архитектура из статьи <q>Attention Is All You Need</q>, на которой стоят все современные LLM. Прорыв дала не дорожная карта, а ошибка плюс комбинаторика уже созревших предпосылок: GPU, гигантские массивы данных, self-supervised learning. Тот же паттерн, что у пенициллина Флеминга: революцию приносит тот, кто присмотрелся к аномалии вместо того, чтобы её исправить и забыть."},
  {th:"ai", s:"AI turbo session + Working in teams", t:"LLM — математика предсказания связей; сильны там, где размерность системы выше человеческой (материаловедение).", d:"Полезно снять с LLM мистику: это математика, предсказывающая связи между элементами, — и именно поэтому она сильнее всего там, где размерность задачи превышает человеческую способность держать всё в голове. Показательный кейс с лекции: крупная компания-производитель клеёв под угрозой миллиардных исков за PFAS скормила ИИ свой многолетний архив R&D — включая неудачные эксперименты, — и система за месяцы нашла замену вредному компоненту, причём дешевле и лучше по свойствам; людям такая задача стоила бы лет работы. Материаловедение, биохимия, сложные системы — территории, где ИИ уже не ассистент, а сверхчеловеческий исследователь."},
  {th:"ai", s:"AI turbo session + Working in teams", t:"Поведение модели можно тихо изменить одной неочевидной фичей — новый класс рисков безопасности и влияния.", d:"Исследователи показали: сдвинув вес одной-единственной неочевидной фичи, можно радикально поменять поведение модели — в эксперименте с усилением сикофантства модель, прежде корректно называвшая фразу старой идиомой, начала восхвалять её как <q>гениальное и глубокое выражение мудрости</q>. Это новый класс рисков: модель можно тихо перекосить в политических или конкурентных целях, и снаружи никто ничего не заметит. Реакция самого спикера — <q>holy s</q> — точно передаёт масштаб: речь уже не о качестве ответов, а о невидимых бэкдорах влияния."},
  {th:"ai", s:"AI turbo session + Working in teams", t:"Post-trust world: <q>Assume everything you see is wrong</q>, пока доверие не установлено.", d:"Генеративный ИИ плюс годы ваших бездумных кликов позволяют собрать персональное <q>поле искажения реальности</q>: контент, заточенный под убеждение конкретно вас, неотличимый от настоящего. Отсюда вывод лекции: мы вошли в мир после доверия, где презумпция достоверности умерла — всё увиденное считается ложным, пока источник не доказал обратное. Обратная сторона важнее для бизнеса: в таком мире доверие становится самым дефицитным активом, и выигрывают компании и люди, сумевшие его выстроить и удержать."},
  {th:"ai", s:"The Economic, Political, and Social Implications of Transformative AI", t:"<q>Attention is all you need</q>.", d:"Название статьи Google 2017 года, породившей трансформер и всю нынешнюю волну ИИ. Механизм attention позволил модели взвешивать связи между всеми словами сразу, а не читать текст последовательно, — и оказалось, что этого достаточно: от рекуррентных сетей отказались вовсе. Красивая ирония в том, что фраза работает и как жизненный принцип: в эпоху бесконечного контента именно внимание — своё и аудитории — стало главным дефицитным ресурсом, за который конкурируют все."},
  {th:"ai", s:"Handling Hot-Button Issues", t:"Технологии внедряются быстрее, чем успевает регулирование, — универсального решения нет.", d:"Регулирование по своей природе догоняющее: демократические институты осмысляют технологию десятилетиями, а ИИ достиг массового проникновения за месяцы — разрыв стал непреодолимым. Кейс Meta и политической речи это иллюстрирует: единых правил модерации, работающих во всех странах и контекстах, просто не существует, и каждое решение платформы кого-то возмущает. Ответ Шоттса — risk by design: раз никто не скажет заранее, что выстрелит, управление риском нельзя делегировать регулятору или комплаенсу, оно должно быть вшито в культуру, где <b>каждый</b> сотрудник — риск-менеджер."},

  {th:"marketing", s:"Marketing sessions", t:"<q>Last one in is the first one out</q> — последний пришедший на рынок уходит первым.", d:"Вес Хартманн о порядке входа в категорию: опоздавший игрок дерётся за остаточный спрос без отличимой позиции, поэтому при первом же сжатии рынка вылетает первым. Защита — не скорость, а позиционирование: разбиравшийся в классе Overtime Fitness, подростковый зал с видеоиграми, выживает не как ещё один спортзал против Gold's Gym, а как новая категория со своей ценностью для детей и родителей. Не можешь быть первым в категории — создай категорию, где ты первый."},

  {impl:true, th:"edu", s:"EduInsights", t:"NPS-анкету конструируй так, чтобы отвлечь клиента от цены и подвести к ценности: вопросы про конкретного человека и методику, а не «в среднем по организации».", d:"Совет консультантов по сети детских садов: анкета удовлетворённости сама формирует, о чём родитель думает, пока отвечает. Спросишь <q>довольны ли вы в целом</q> — родитель мысленно сравнит цену с рынком; спросишь про конкретного воспитателя и методику — вспомнит, за что платит. Применение: перед запуском NPS-опроса проверь каждый вопрос — подводит он к ценности или возвращает к цене."},
  {impl:true, th:"edu", s:"EduInsights", t:"KPI с ощутимой вилкой к окладу мотивирует, но внедрение — это месяцы сопровождения людей, а не «распечатать инструкцию»; отдельный KPI руководителя — снижение текучки.", d:"С той же встречи: KPI работает, только если вилка к окладу ощутимая — символические проценты поведение не меняют. Главная ловушка — считать внедрение бумажной задачей: реальный срок — месяцы физического сопровождения людей, пока новые правила не станут привычкой. И отдельно: лучший KPI руководителя площадки — снижение текучки команды, потому что за ним прячутся и атмосфера, и качество управления."},
  {th:"culture", s:"@OReilly", t:"Успех — это alignment: стратегия, ключевые задачи, люди, культура и формальная структура должны сходиться. <q>Fit → Performance</q> — разрыв в любом из пяти углов съедает результат.", d:"О'Райли строит весь курс на модели конгруэнтности: стратегия, ключевые задачи, люди, формальная структура и культура — пять углов, которые обязаны поддерживать друг друга. Диагностика провала — это не поиск виноватых, а поиск разрыва: блестящая стратегия гибнет, если система наград поощряет старое поведение. Классическая иллюстрация — Continental Airlines до Бетьюна: стратегия требовала пунктуальности, но ни метрики, ни вознаграждения, ни символы её не поддерживали, и компания была худшей в отрасли. Как только Бетьюн выровнял все элементы под одну цель, авиалиния ушла с последнего места."},
  {th:"culture", s:"@OReilly", t:"Цепочка управления культурой обратна интуиции: Information → Behavior → Attitudes. Сначала меняй, что измеряется и вознаграждается; установки придут последними.", d:"Интуиция велит менять культуру через убеждение: объясни людям «почему», сдвинь установки — поведение подтянется. О'Райли доказывает обратный порядок: сначала меняется информация — что измеряется, что вознаграждается, что люди видят вокруг, — затем поведение, и лишь потом установки, через когнитивный диссонанс: <q>я так делаю — значит, я в это верю</q>. Сотрудники Continental сначала стали отправлять рейсы вовремя ради чека в $65 — и только потом поверили, что работают в хорошей авиакомпании."},
  {impl:true, th:"culture", s:"@OReilly", t:"Пять рычагов культуры — модель LEASH: Leader actions, Employee involvement, Aligned rewards, Stories/symbols/signals, HR alignment. Внедряешь изменение — проверь все пять.", d:"Мнемоника собирает весь инструментарий культурных изменений: личные действия лидера, вовлечение сотрудников в выработку норм, награды, выровненные с нужным поведением, истории и символы, HR-процессы — найм, повышения, увольнения. Провал одного рычага обнуляет остальные: плакаты с ценностями при старой системе бонусов — театр. Наделла в Microsoft задействовал все пять: сам моделировал growth mindset, месяцами слушал сотрудников, убил stack ranking, превратил извинение после Grace Hopper в историю, встроил культурное интервью в повышения. <b>Практика:</b> перед запуском изменения пройди по пяти буквам как по чек-листу и честно ответь, что делаешь по каждой, — пропущенный рычаг и есть причина будущего провала."},
  {th:"culture", s:"@OReilly", t:"Культура — это не ценности, а ожидания поведения: <q>values don't tell you how to behave</q>. Мэри Барра меняла культуру GM, ни разу не сказав слово «культура», — она задала 7 конкретных поведений.", d:"Плакат «integrity» не подсказывает инженеру, что делать, когда найден дефект, а дедлайн горит, — ценности не транслируются в действия сами. Барра, принявшая GM в разгар скандала с дефектными замками зажигания, не запускала программу «новой культуры»: она сформулировала семь конкретных поведений, которых ждёт от людей, и встроила их в управленческую практику. Разница принципиальна: ценности — про то, во что верить, культура — про социальные ожидания, как здесь себя ведут; менять можно только второе."},
  {th:"culture", s:"@OReilly", t:"Ценностями управлять нельзя, нормы можно только измерять — управлять можно лишь поведением.", d:"Трёхслойная модель О'Райли: ценности сидят глубоко в человеке и прямому управлению не поддаются; нормы — коллективные ожидания — можно измерять опросами, но нельзя приказать; единственный слой, доступный менеджеру напрямую, — наблюдаемое поведение. Отсюда практический стержень всего курса: формулируй культурное изменение как список конкретных действий, которые люди начнут и перестанут делать, а не как новый набор слов на стене. Поведение закрепится — нормы и установки подтянутся следом."},
  {th:"culture", s:"@OReilly", t:"Поведение в организации определяют ожидания окружающих, а не личность: О'Райли два года тестировал 135 MBA — и не смог предсказать их карьеры. Ситуация побеждает личность.", d:"В начале карьеры О'Райли два года прогонял 135 студентов MBA через батареи личностных тестов, рассчитывая предсказать их карьерные траектории, — предсказательная сила оказалась ничтожной. Вывод, перевернувший его исследования: поведение в организациях задаёт сила ситуации — ожидания коллег и руководителей, а не черты характера. Один и тот же человек в Amazon и в благотворительном фонде ведёт себя по-разному; значит, лидер управляет не подбором «правильных личностей», а конструированием правильной ситуации."},
  {th:"culture", s:"@OReilly", t:"«Мы моем руки, только когда смотрят»: при наблюдателе моют 90%, без него — резкое падение. Культура и есть наблюдение.", d:"Медики прекрасно знают, зачем мыть руки, — но знание не управляет поведением. В исследованиях гигиены при явном наблюдателе руки моют до 90% персонала; стоит наблюдению исчезнуть — показатель обваливается. Для О'Райли это и есть рабочее определение культуры: система социального контроля, действующая там, где формального надзора нет. Сильная культура — не когда люди правильно ведут себя под камерой, а когда отклонение замечают коллеги и им не всё равно."},
  {th:"culture", s:"@OReilly", t:"Деньги — слабый инструмент культуры; статус, признание и одобрение — сильный. Бетьюн платил отдельным чеком $65 за пунктуальность и отказался вшивать в зарплату: отдельный чек — символ, строка в расчётке — ничто.", d:"Вытаскивая Continental с последнего места по пунктуальности, Бетьюн пообещал каждому сотруднику чек на $65 за каждый месяц, когда авиакомпания в лидерах рейтинга. Финансисты предлагали вшить сумму в зарплату — он отказался: строка в расчётке невидима, а отдельный чек человек показывает семье. Урок О'Райли: деньги здесь работали не как материальный стимул, а как символ признания — статус и одобрение окружающих двигают поведение сильнее самой суммы."},
  {th:"culture", s:"@OReilly", t:"«Театр изменения культуры»: 96% руководителей считают, что культуру надо менять, — успешно меняют 15%.", d:"Разрыв между 96% руководителей, признающих необходимость менять культуру, и 15% реально меняющих — не от глупости, а от жанровой ошибки: культуру «запускают» офсайтом, плакатом и рассылкой, то есть играют театр. Настоящее изменение требует лет занудного повторения, перестройки наград и болезненных кадровых решений. Большинство лидеров сдаётся, когда аплодисменты за премьеру собраны, а работа ещё даже не началась."},
  {th:"culture", s:"@OReilly", t:"Культуру меняет занудное повторение, а не яркий запуск: <q>relentless and boring</q>. Наделла десять лет твердит growth mindset — лидеры обычно сдаются раньше, чем сообщение доходит.", d:"Наделла повторяет growth mindset в каждом письме, на каждом ревью и каждой конференции с 2014 года — больше десяти лет одно и то же сообщение. О'Райли называет это главным секретом культурных изменений: работает <q>relentless and boring</q>, а не эффектный запуск. Лидеру собственное сообщение надоедает задолго до того, как организация начала его слышать, — и именно в этой точке большинство переключается на новую инициативу, обнуляя всё вложенное."},
  {th:"culture", s:"@OReilly", t:"Культурой не занимаются, потому что она окупается через 2–3 года — за горизонтом квартальных метрик.", d:"Инвестиции в культуру конфликтуют с системой отчётности: эффект приходит через два-три года, а руководителя судят по кварталам. Поэтому рациональный CEO вкладывается в то, что видно быстро, и культурная работа вечно проигрывает «срочному». Но у медали есть оборот: раз культуру нельзя купить или скопировать за квартал, она становится защищаемым преимуществом — что и доказала DaVita, построившая на ней бизнес в $12 млрд."},
  {impl:true, th:"culture", s:"@OReilly", t:"Диагностика культуры за 5 минут: «какой совет ты дал бы другу, который к нам устраивается, — как преуспеть и чего избегать?» Реальная культура — то, что реально вознаграждается.", d:"Вместо дорогих опросов вовлечённости О'Райли предлагает один вопрос сотруднику: что бы ты посоветовал другу, который сюда устраивается, — как здесь преуспеть и на чём люди подрываются? Отвечая «по-дружески», люди мгновенно выдают реальные правила игры: за что на самом деле повышают, о чём молчат на встречах, кого не трогают. <b>Практика:</b> задай этот вопрос пяти-десяти людям с разных уровней и сравни ответы с декларируемыми ценностями — карта расхождений и есть твоя настоящая культура и повестка изменений."},
  {impl:true, th:"culture", s:"@OReilly", t:"«Покажи мне свой календарь за 12 месяцев — и я скажу, во что верят твои сотрудники». Люди читают не слова лидера, а его время, вопросы и поведение под давлением.", d:"Сотрудники — профессиональные дешифровщики: они считывают не речи лидера, а распределение его времени, первые вопросы на встречах и реакции под давлением. Если CEO объявляет «клиент — приоритет», а в календаре за год нет ни одной встречи с клиентами, организация верит календарю. <b>Практика:</b> регулярно проводи аудит — разложи свои встречи за 12 месяцев по заявленным приоритетам и посмотри, что транслируешь на самом деле; затем перекраивай календарь как главный канал коммуникации, которым он и является."},
  {th:"culture", s:"@OReilly", t:"<q>The world is full of bankrupt companies with world-class cultures</q>. Kotter & Heskett: у «сильных культур» эффекта ноль — работает только сильная, согласованная со стратегией и способная меняться.", d:"Kotter и Heskett на выборке из двух сотен компаний проверили любимый тезис консультантов — и не нашли связи между «силой» культуры и долгосрочными результатами. Сильная, но не та культура лишь ускоряет движение в стену: сплочённость вокруг устаревшей стратегии опаснее разброда. Работает тройное условие: культура сильная, согласованная со стратегией и адаптивная — способная перестроиться, когда стратегия меняется. Поэтому мир и полон банкротов с культурой мирового класса."},
  {th:"culture", s:"@OReilly", t:"Хорошая культура ≠ приятная: Amazon и Cypress успешны именно жёсткими культурами — потому что те согласованы со стратегией.", d:"Ошибка — мерить культуру шкалой «приятно ли работать»: у Amazon конфронтационные разборы и высочайшая планка, у Cypress Роджерса — тотальная дисциплина обязательств, и обе компании выигрывали именно этим. Критерий правильной культуры один: помогает ли она исполнять стратегию. Жёсткость Amazon обслуживает стратегию скорости и стандартов, а «доброта» без результата — просто отложенный способ подвести людей."},
  {th:"culture", s:"@OReilly", t:"DaVita: культура как ров там, где технология не даёт преимущества. «Весёлая деревня» → меньше текучки техников → пациенты остаются → лучшие клинические результаты → $12 млрд.", d:"Диализ — коммодити: одинаковые аппараты, стандартные протоколы, регулируемые тарифы — технологией не дифференцируешься. Кент Тири сделал ров из культуры: «весёлая деревня» с ритуалами, песнями и клятвами выглядит нелепо снаружи, но снижает текучку техников, а стабильные команды дают преемственность ухода, лучшие клинические результаты и удержание пациентов. Эта цепочка и превратила DaVita в бизнес на $12 млрд: оборудование конкурент купит завтра, культуру — никогда."},
  {th:"culture", s:"@OReilly", t:"CEO моделирует культуру признанием собственных ошибок: Наделла публично извинился после Grace Hopper — <q>to celebrate imperfection is a hard thing</q>.", d:"В 2014 году на конференции Grace Hopper Наделла посоветовал женщинам не просить прибавку и довериться карме — и получил шквал критики. Вместо оправданий он публично признал ошибку и превратил её в живую демонстрацию того самого growth mindset, который проповедовал. Такой сигнал сильнее любой рассылки: если CEO может ошибаться и учиться на глазах у всех, признание ошибок становится безопасным для каждого — <q>to celebrate imperfection is a hard thing</q>, поэтому её моделируют сверху."},
  {th:"culture", s:"@OReilly", t:"<q>Failure isn't the problem; success is the problem</q> — с успехом приходят рост и потеря контроля (кейс Cypress).", d:"Роджерс подметил парадокс: провалы дисциплинируют, а успех разлагает — с ним приходят быстрый найм, размывание планки и потеря контроля над тем, кто и что пообещал. Cypress отвечала системами: тысячи отслеживаемых обязательств, прозрачные цели, «killer software». Вывод для лидера: усиливать управленческую дисциплину нужно в момент триумфа, а не после первых трещин — главный фактор риска не неудача, а именно успех."},
  {th:"culture", s:"@OReilly", t:"«Тёпло-пушистые» культуры без результата — лицемерие: «жизнь сердечна ровно до дня смерти компании» (Роджерс, Cypress).", d:"Роджерс атаковал моду на «тёплые» культуры Кремниевой долины жёстким аргументом: обещать людям заботу и при этом терять конкурентоспособность — лицемерие, потому что сердечность заканчивается в день смерти компании. Настоящая забота о сотрудниках — требовательность, которая держит компанию живой, акции — ценными, а рабочие места — существующими. Комфорт без результата — доброта в кредит, по которому расплачиваются увольнениями."},
  {th:"culture", s:"@OReilly", t:"Повышения — это сообщения, а не деньги: топ группы должен получать на ~50% больше низа, иначе сигнал «результат не важен». «Тирания среднего» деморализует лучших.", d:"Кого повысили и кому сколько дали — самый читаемый культурный сигнал в компании, и смотрят на него все. О'Райли настаивает: лучшие в группе должны получать примерно на 50% больше худших, иначе организация слышит «результат не важен». «Тирания среднего» — когда менеджер размазывает бюджет повышений ровным слоем, чтобы никого не обидеть, — обижает единственных, кого нельзя терять: сильнейших, которые видят, что их вклад оценён как посредственный."},
  {impl:true, th:"culture", s:"@OReilly", t:"«Лучший способ продать компанию кандидату — сделать вход адски трудным»: 4–6 интервью и честное «мы много работаем, повышения при входе не будет. Продолжим?»", d:"Контринтуитивная вербовка строится на эффекте оправдания усилий, знакомом по элитным подразделениям: чем труднее вход, тем ценнее членство. Вместо глянцевой продажи вакансии — 4–6 интервью и честный разговор: работы много, входного повышения не будет — продолжаем? Прошедшие такой фильтр люди приверженнее и дольше остаются: они выбрали компанию с открытыми глазами. <b>Практика:</b> убери из найма приукрашивание и добавь честное описание худших сторон работы — отсев на входе дешевле разочарования после."},
  {th:"culture", s:"@OReilly", t:"«Нельзя ждать, что люди думают как предприниматели, пока не сделаешь их предпринимателями»: внутренние стартапы Cypress с настоящими акциями; из личных $750 тыс. в SunPower выросли $2,6 млрд.", d:"Роджерс понимал, что нельзя требовать предпринимательского мышления от людей на окладе, — и построил Cypress как «федерацию предпринимателей»: внутренние стартапы с настоящими акциями дочерних компаний, а не фантомными опционами материнской. В SunPower он поверил настолько, что вложил $750 тыс. личных денег, когда проект висел на волоске, — ставка выросла в $2,6 млрд. Владение меняет поведение там, где лозунги об ownership mindset бессильны."},
  {th:"culture", s:"@OReilly", t:"Парадокс достоверной угрозы: «killer software» Cypress останавливала работу при срыве обязательств — и потому почти не применялась. Систему применяли даже к CEO.", d:"В Cypress обязательства фиксировались в системе, и срыв критических дедлайнов мог буквально остановить рабочие процессы — та самая «killer software». Парадокс: именно потому, что угроза была достоверной и неотвратимой, применять её почти не приходилось — люди заранее управляли своими обещаниями. Ключ к легитимности — универсальность: система действовала даже на CEO, поэтому читалась как дисциплина, а не репрессия. Угроза, в которую верят, работает лучше наказаний, которые приходится исполнять."},
  {th:"disruption", s:"@OReilly", t:"<q>Alignment leads to success — and success leads to inertia</q>: то самое выравнивание, что даёт успех, застывает в процессах, метриках и в голове лидера.", d:"«Синдром успеха» из Lead and Disrupt: выравнивание стратегии, людей, культуры и структуры — двигатель результата, но со временем оно же застывает в бетон. Процессы оптимизируются под вчерашний рынок, метрики вознаграждают проверенное, а лидер начинает верить в формулу, которая уже сработала. Так Sears и Blockbuster дошли до конца, не сделав ничего «неправильного»: их машины были идеально настроены на исчезающий мир. Инерция — не глупость, а обратная сторона хорошо сделанной работы."},
  {th:"disruption", s:"@OReilly", t:"Данные ослепляют: опора на данные гарантирует инкрементальность — анализ прорывной возможности всегда покажет «вероятность успеха мала, не делаем».", d:"Аналитика работает там, где есть история, а у прорывного рынка её нет по определению: он мал, неизмерим и не похож на существующих клиентов. Честный расчёт NPV по AWS или по кварцевым часам в момент запуска показал бы «не делать» — и был бы формально прав. Поэтому data-driven культура гарантирует инкрементальность: она отбраковывает всё, что нельзя доказать заранее. Для explore-ставок нужен не расчёт, а суждение лидера о будущем — данные подтянутся позже."},
  {th:"disruption", s:"@OReilly", t:"Salesforce: лишь ~17% выручки приходит от CRM. Если бы они только «улучшали ядро», 100% выручки было бы от CRM — но компания была бы в разы меньше.", d:"Бениофф последовательно уводил Salesforce за пределы ядра: платформа Force.com, Marketing Cloud, покупки MuleSoft, Tableau и Slack — каждая новая линия поначалу выглядела отвлечением от CRM. Итог: ядро даёт лишь около 17% выручки, а компания на порядок больше «чистого CRM-вендора». Парадокс О'Райли: падение доли ядра — признак не его смерти, а того, что вокруг выросло новое. Компания, которая только полирует ядро, — это компания, выбравшая быть маленькой."},
